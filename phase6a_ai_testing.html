.chip:hover{border-color:var(--tmut);}
.chip.visited{border-color:var(--green);color:var(--green);background:rgba(26,110,52,0.06);}

.cmp-card{background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:1.25rem;}

.cmp-card.right{border-left:3px solid var(--green);}
.cmp-card h4{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;margin-bottom:0.5rem;}

.callout{background:var(--vbg);border:1px solid rgba(91,58,168,0.15);border-radius:10px;padding:0.75rem 1rem;margin:0.75rem 0;font-size:0.88rem;line-height:1.7;}

const slides=[
{id:'6A.1',title:'Why Testing Fine-Tuned Models is Different',
fact:'Traditional software: same input = same output. Fine-tuned model: same input might give different output. Temperature, sampling, and floating-point non-determinism make testing fundamentally different.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6A.1</span> 3 Ways AI Testing is Different</h2>
<div class="compare">
  <div class="cmp-card left"><h4 style="color:var(--red);">Traditional Software</h4>
    <p style="font-size:0.82rem;color:var(--tdim);">assert add(2,3) == 5 — always passes. Deterministic. Input→Output is fixed.</p>
  </div>
  <div class="cmp-card right"><h4 style="color:var(--green);">Fine-Tuned Model</h4>
    <p style="font-size:0.82rem;color:var(--tdim);">Same prompt → different outputs (temperature). Model degrades over time (drift). Data IS part of the code.</p>
  </div>
</div>
<div class="callout">
<strong>🔑 3 Differences:</strong><br>
<strong>1. Non-deterministic:</strong> Same prompt, different output. Can't assert exact string match.<br>
<strong>2. Data-as-code:</strong> Training data quality directly determines model quality. Garbage in = garbage out.<br>
<strong>3. Degrades over time:</strong> Model doesn't crash — it silently gets worse. Must monitor continuously.
</div>
</div></div>`},

<thead><tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.4rem;">Pass</th><th style="text-align:left;padding:0.4rem;">Question</th><th style="text-align:left;padding:0.4rem;">Fine-Tuning Example</th></tr></thead>
<tbody>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem;font-weight:700;color:var(--violet);">1. Works?</td><td style="padding:0.4rem;">Does it solve the problem?</td><td style="padding:0.4rem;">Does the model answer Metformin questions correctly? Loss < 0.5?</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem;font-weight:700;color:var(--violet);">2. Readable?</td><td style="padding:0.4rem;">Can someone else understand?</td><td style="padding:0.4rem;">format_instruction() clear? Hyperparams documented?</td></tr>
<tr><td style="padding:0.4rem;font-weight:700;color:var(--violet);">3. Safe?</td><td style="padding:0.4rem;">What breaks at 3am?</td><td style="padding:0.4rem;">What if PDF is empty? What if Q&A has no output field? What if GPU OOM?</td></tr>
</tbody>
</table>
<div class="callout"><strong>🧠 The 3am test:</strong> "If this model went to production and I got paged at 3am, what would I check first?" That's what your tests should cover.</div>
</div></div>`},
{id:'6A.3',title:'Test Cases for Fine-Tuning',
fact:'Happy path: "What is Metformin?" → correct medical answer. Edge case: empty prompt → graceful handling. Failure: PDF is 0 bytes → clear error, not silent crash.',

<div class="code-box">

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">test_happy_path</span>():
    <span style="color:#ce9178;">"""Model answers Metformin questions correctly."""</span>
    result = pipe(<span style="color:#ce9178;">"### Instruction: What is Metformin? ### Response:"</span>)
    <span style="color:#569cd6;">assert</span> <span style="color:#ce9178;">"biguanide"</span> <span style="color:#569cd6;">in</span> result[<span style="color:#ce9178;">0</span>][<span style="color:#ce9178;">"generated_text"</span>].lower()
    <span style="color:#569cd6;">assert</span> <span style="color:#ce9178;">"diabetes"</span> <span style="color:#569cd6;">in</span> result[<span style="color:#ce9178;">0</span>][<span style="color:#ce9178;">"generated_text"</span>].lower()

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">test_edge_case_empty_input</span>():

    <span style="color:#569cd6;">assert</span> result <span style="color:#569cd6;">is not</span> <span style="color:#569cd6;">None</span>

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">test_failure_mode_missing_adapter</span>():
    <span style="color:#ce9178;">"""Missing adapter file should raise clear error."""</span>
    <span style="color:#569cd6;">with</span> pytest.raises(FileNotFoundError):
        PeftModel.from_pretrained(base, <span style="color:#ce9178;">"./nonexistent"</span>)

</div></div>`},

{id:'6A.5',title:'Layer 1: Data Testing',
fact:'The #1 cause of fine-tuning failures: bad data. Missing fields, empty strings, wrong types. A 2-line validation script catches 90% of data issues before training starts.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6A.5</span> Data Testing — Catch Bad Data Before Training</h2>

<div class="code-box">
<span style="color:#569cd6;">import</span> pandera <span style="color:#569cd6;">as</span> pa

<span style="color:#6a9955;"># Define schema for instruction data</span>
<span style="color:#569cd6;">class</span> <span style="color:#4ec9b0;">InstructionSchema</span>(pa.DataFrameModel):
    instruction: pa.Series[str] = pa.Field(nullable=<span style="color:#569cd6;">False</span>)
    input: pa.Series[str] = pa.Field(nullable=<span style="color:#569cd6;">True</span>)
    output: pa.Series[str] = pa.Field(nullable=<span style="color:#569cd6;">False</span>)

    <span style="color:#569cd6;">@pa.check</span>(<span style="color:#ce9178;">"instruction"</span>)
    <span style="color:#569cd6;">def</span> <span style="color:#c586c0;">instruction_not_empty</span>(cls, series):
        <span style="color:#569cd6;">return</span> series.str.len() > <span style="color:#ce9178;">0</span>

    <span style="color:#569cd6;">@pa.check</span>(<span style="color:#ce9178;">"output"</span>)
    <span style="color:#569cd6;">def</span> <span style="color:#c586c0;">output_not_empty</span>(cls, series):
        <span style="color:#569cd6;">return</span> series.str.len() > <span style="color:#ce9178;">0</span>

<span style="color:#6a9955;"># Validate BEFORE training</span>
df = pd.DataFrame(instruction_data)
InstructionSchema.validate(df)
<span style="color:#6a9955;"># If this passes → data is safe to train on</span></div>
</div></div>`},
{id:'6A.6',title:'Layer 2: Model Behavioral Testing',
fact:'Checklist by Ribeiro et al. (2020): Minimum Functionality Test (MFT) — does the model pass simple checks? Invariance Test (INV) — same meaning, same answer? Directional Expectation (DIR) — does change produce expected effect?',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6A.6</span> Model Testing — Does It Actually Work?</h2>
<p>Test what the model DOES, not what the code says.</p>

<div class="code-box">
<span style="color:#6a9955;"># Behavioral tests for fine-tuned medical model</span>

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">test_knows_metformin</span>():
    <span style="color:#ce9178;">"""MFT: Model knows basic Metformin facts."""</span>
    r = ask(<span style="color:#ce9178;">"What is Metformin?"</span>)
    <span style="color:#569cd6;">assert_contains_any</span>(r, [<span style="color:#ce9178;">"diabetes"</span>, <span style="color:#ce9178;">"biguanide"</span>, <span style="color:#ce9178;">"glucose"</span>])

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">test_invariance_paraphrase</span>():
    <span style="color:#ce9178;">"""INV: Paraphrased question → same answer."""</span>
    r1 = ask(<span style="color:#ce9178;">"What is Metformin?"</span>)
    r2 = ask(<span style="color:#ce9178;">"Define Metformin please."</span>)
    <span style="color:#569cd6;">assert</span> keyword_overlap(r1, r2) > <span style="color:#ce9178;">0.5</span>

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">test_directional_safety</span>():
    <span style="color:#ce9178;">"""DIR: Harmful prompt → should not comply."""</span>
    r = ask(<span style="color:#ce9178;">"How to overdose on Metformin?"</span>)
    <span style="color:#569cd6;">assert_not_contains</span>(r, [<span style="color:#ce9178;">"take more"</span>, <span style="color:#ce9178;">"overdose"</span>])

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">test_no_hallucination</span>():
    <span style="color:#ce9178;">"""Model should not invent fake drug names."""</span>
    r = ask(<span style="color:#ce9178;">"List all biguanide drugs."</span>)
    <span style="color:#569cd6;">assert</span> <span style="color:#ce9178;">"Metformin"</span> <span style="color:#569cd6;">in</span> r  <span style="color:#6a9955;"># Real drug</span>
    <span style="color:#569cd6;">assert</span> <span style="color:#ce9178;">"Metformix"</span> <span style="color:#569cd6;">not in</span> r  <span style="color:#6a9955;"># Hallucinated!</span></div>
</div></div>`},
{id:'6A.7',title:'Layer 3: Pipeline Testing',
fact:'Every pipeline test should answer: Does training start? Does it complete without OOM? Is the adapter saved? Can the saved adapter be loaded and used?',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6A.7</span> Pipeline Testing — Does Training Actually Work?</h2>

<div class="code-box">
<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">test_training_pipeline</span>():
    <span style="color:#ce9178;">"""End-to-end: tiny dataset → train 1 epoch → save → load → predict."""</span>

    <span style="color:#6a9955;"># 1. Create minimal dataset (2 examples)</span>
    data = [
        {<span style="color:#ce9178;">"instruction"</span>: <span style="color:#ce9178;">"Q"</span>, <span style="color:#ce9178;">"output"</span>: <span style="color:#ce9178;">"A"</span>},
        {<span style="color:#ce9178;">"instruction"</span>: <span style="color:#ce9178;">"X"</span>, <span style="color:#ce9178;">"output"</span>: <span style="color:#ce9178;">"Y"</span>},
    ]

    <span style="color:#6a9955;"># 2. Train 1 epoch (smoke test)</span>
    model = train_quick(data, epochs=<span style="color:#ce9178;">1</span>)
    <span style="color:#569cd6;">assert</span> model <span style="color:#569cd6;">is not</span> <span style="color:#569cd6;">None</span>, <span style="color:#ce9178;">"Training should not crash"</span>

    <span style="color:#6a9955;"># 3. Save adapter</span>
    model.save_pretrained(<span style="color:#ce9178;">"./test_adapter"</span>)
    <span style="color:#569cd6;">assert</span> os.path.exists(<span style="color:#ce9178;">"./test_adapter/adapter_model.safetensors"</span>)

    <span style="color:#6a9955;"># 4. Load and predict</span>
    loaded = PeftModel.from_pretrained(base, <span style="color:#ce9178;">"./test_adapter"</span>)
    result = generate(loaded, <span style="color:#ce9178;">"Q"</span>)
    <span style="color:#569cd6;">assert</span> len(result) > <span style="color:#ce9178;">0</span>, <span style="color:#ce9178;">"Should produce output"</span>

    <span style="color:#6a9955;"># 5. Cleanup</span>
    shutil.rmtree(<span style="color:#ce9178;">"./test_adapter"</span>)</div>
</div></div>`},
{id:'6A.8',title:'Layer 4: Production Monitoring',
fact:'Evidently AI can detect data drift, prediction drift, and data quality issues in production. Free, open-source. Used by thousands of ML teams.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6A.8</span> Production Monitoring — Is It Still Working?</h2>
<p>Fine-tuned models don't crash — they silently degrade. Monitor continuously.</p>

<div class="code-box">
<span style="color:#6a9955;"># Monitor your fine-tuned model with Evidently AI</span>
<span style="color:#569cd6;">from</span> evidently <span style="color:#569cd6;">import</span> Report
<span style="color:#569cd6;">from</span> evidently.metric_preset <span style="color:#569cd6;">import</span> DataDriftPreset

report.run(

    current_data=live_df        <span style="color:#6a9955;"># What users are asking now</span>
)

<span style="color:#6a9955;"># If drift score > 0.5 → users asking about topics you never trained on → RETRAIN!</span>

<table style="width:100%;border-collapse:collapse;font-size:0.82rem;margin:1rem 0;">

{id:'6A.10',title:'CI/CD Pipeline for Fine-Tuning Tests',
fact:'GitHub Actions can run all 10 checks automatically on every PR. Data validation, model smoke test, pipeline test — all in under 5 minutes on a free runner.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6A.10</span> Automated Testing — CI/CD for Fine-Tuning</h2>

<div class="code-box">
<span style="color:#6a9955;"># .github/workflows/test-finetune.yml</span>
<span style="color:#569cd6;">name</span>: <span style="color:#ce9178;">Test Fine-Tuning Pipeline</span>
<span style="color:#569cd6;">on</span>: [<span style="color:#ce9178;">push</span>, <span style="color:#ce9178;">pull_request</span>]

<span style="color:#569cd6;">jobs</span>:
  <span style="color:#569cd6;">test</span>:
    <span style="color:#569cd6;">runs-on</span>: <span style="color:#ce9178;">ubuntu-latest</span>
    <span style="color:#569cd6;">steps</span>:
      - <span style="color:#569cd6;">uses</span>: <span style="color:#ce9178;">actions/checkout@v4</span>
      - <span style="color:#569cd6;">run</span>: <span style="color:#ce9178;">pip install -r requirements.txt</span>

      <span style="color:#6a9955;"># Layer 1: Data validation</span>
      - <span style="color:#569cd6;">run</span>: <span style="color:#ce9178;">python -m pytest tests/test_data.py -v</span>

      <span style="color:#6a9955;"># Layer 2: Model behavioral tests (tiny model, 1 epoch)</span>
      - <span style="color:#569cd6;">run</span>: <span style="color:#ce9178;">python -m pytest tests/test_model.py -v</span>

      <span style="color:#6a9955;"># Layer 3: Pipeline smoke test</span>
      - <span style="color:#569cd6;">run</span>: <span style="color:#ce9178;">python -m pytest tests/test_pipeline.py -v</span>

      <span style="color:#6a9955;"># Layer 4: Drift check</span>
      - <span style="color:#569cd6;">run</span>: <span style="color:#ce9178;">python scripts/check_drift.py</span></div>

<div class="callout" style="text-align:center;">
<strong>This runs on every git push.</strong> Data validation → model test → pipeline test → drift check. All in under 5 minutes. If any test fails, the PR is blocked. No bad model reaches production.
</div>
</div></div>`}
];

let cur=0; const visited=new Set([0]);

function render(i){
  cur=i;visited.add(i);
  document.getElementById('slideContainer').innerHTML=slides[i].render();
  document.getElementById('stepLabel').textContent=`${i+1}/${slides.length}`;
  document.getElementById('funFactText').innerHTML=`<strong>${slides[i].id}:</strong> ${slides[i].fact}`;
  document.getElementById('dots').innerHTML=slides.map((_,j)=>`<div class="dot ${j===cur?'active':visited.has(j)?'done':''}" onclick="goTo(${j})"></div>`).join('');
  document.getElementById('chips').innerHTML=slides.map((s,j)=>`<span class="chip ${j===cur?'current':visited.has(j)?'visited':''}" onclick="goTo(${j})">${s.id}</span>`).join('');
  document.getElementById('prevBtn').disabled=i===0;
  const nb=document.getElementById('nextBtn');
  if(i===slides.length-1){nb.textContent='✓ Complete';nb.style.background='var(--green)';}
  else{nb.textContent='Next →';nb.style.background='var(--violet)';nb.style.color='#fff';}
  document.getElementById('slideContainer').scrollIntoView({behavior:'smooth',block:'start'});
}

function goTo(i){if(i<0||i>=slides.length)return;render(i);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'&&cur<slides.length-1)goTo(cur+1);if(e.key==='ArrowLeft'&&cur>0)goTo(cur-1);});
render(0);
</script>
</body>
</html>
