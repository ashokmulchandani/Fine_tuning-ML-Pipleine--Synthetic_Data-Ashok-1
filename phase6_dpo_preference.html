<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 6: Preference Alignment (DPO)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafbfc;--card:#fff;--raised:#f0f2f5;--border:#dde0e5;--text:#1a1d23;--tdim:#4a4f5a;--tmut:#8b9099;--violet:#5b3aa8;--vbg:#f3effc;--green:#1a6e34;--amber:#b87000;--cyan:#007a99;--magenta:#9e2a6b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;min-height:100vh;}
.app{max-width:1000px;margin:0 auto;padding:1.5rem;}

.header{text-align:center;padding:2rem 0 1rem;}
.header .badge{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:0.7rem;letter-spacing:0.12em;color:var(--amber);border:1.5px solid rgba(184,112,0,0.3);background:rgba(184,112,0,0.06);border-radius:100px;padding:0.3em 1.2em;margin-bottom:0.75rem;font-weight:600;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:var(--violet);}
.header p{color:var(--tdim);font-size:0.95rem;}

.topbar{position:sticky;top:0;z-index:100;background:rgba(250,251,252,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0.5rem 1.5rem;display:flex;align-items:center;gap:0.8rem;}
.topbar .logo{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;letter-spacing:0.12em;color:var(--violet);white-space:nowrap;font-weight:600;}
.topbar .dots{display:flex;gap:0.3rem;flex:1;justify-content:center;}
.topbar .dot{width:22px;height:3px;border-radius:2px;background:var(--border);transition:0.3s;cursor:pointer;}
.topbar .dot.done{background:var(--green);}
.topbar .dot.active{background:var(--violet);box-shadow:0 0 6px rgba(91,58,168,0.3);}
.topbar .step-label{font-family:'Space Grotesk',monospace;font-size:0.6rem;color:var(--tmut);white-space:nowrap;}

.chips{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin:1rem 0;}
.chip{font-family:'Space Grotesk',sans-serif;font-size:0.6rem;padding:0.4em 1em;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--tmut);cursor:pointer;transition:0.2s;}
.chip:hover{border-color:var(--tmut);}
.chip.visited{border-color:var(--green);color:var(--green);background:rgba(26,110,52,0.06);}
.chip.current{border-color:var(--violet);color:var(--violet);background:var(--vbg);}

.slide{opacity:0;transform:translateY(20px);animation:fadeIn 0.45s ease forwards;}
@keyframes fadeIn{to{opacity:1;transform:translateY(0);}}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.75rem;margin-bottom:1rem;}
.card h2{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:600;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;}
.card h2 .num{font-size:0.7rem;color:var(--violet);background:var(--vbg);border-radius:6px;padding:0.2em 0.6em;font-weight:700;}
.card p{color:var(--tdim);margin-bottom:0.7rem;font-size:1rem;}

.code-box{background:#1e1e1e;border:1px solid #333;border-left:3px solid var(--violet);border-radius:8px;padding:1rem 1.25rem;margin:0.75rem 0;font-family:'Space Grotesk',monospace;font-size:0.9rem;line-height:1.8;white-space:pre-wrap;overflow-x:auto;color:#d4d4d4;position:relative;}

.copy-btn{position:absolute;top:8px;right:8px;font-family:'Space Grotesk',sans-serif;font-size:0.6rem;font-weight:600;padding:0.35em 0.8em;border:1px solid #555;border-radius:6px;background:#2d2d2d;color:#ccc;cursor:pointer;transition:0.15s;opacity:0;}
.code-box:hover .copy-btn{opacity:1;}
.copy-btn:hover{background:#333;color:#c586c0;border-color:#c586c0;}

.compare{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0;}
.cmp-card{background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:1.25rem;}
.cmp-card.left{border-left:3px solid var(--amber);}
.cmp-card.right{border-left:3px solid var(--green);}
.cmp-card h4{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;margin-bottom:0.5rem;}

.fun-fact{background:linear-gradient(135deg,rgba(91,58,168,0.04),rgba(0,122,153,0.04));border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;margin:1rem 0;display:flex;align-items:flex-start;gap:0.7rem;font-size:0.88rem;}

.callout{background:var(--vbg);border:1px solid rgba(91,58,168,0.15);border-radius:10px;padding:0.75rem 1rem;margin:0.75rem 0;font-size:0.9rem;line-height:1.7;}

.nav-row{display:flex;justify-content:space-between;margin:1.5rem 0 3rem;}
.nav-btn{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.06em;padding:0.65em 1.6em;border:1.5px solid var(--border);border-radius:100px;background:var(--bg);color:var(--text);cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:0.4em;}
.nav-btn:hover{border-color:var(--violet);color:var(--violet);}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
.nav-btn.primary{background:var(--violet);border-color:var(--violet);color:#fff;}

.concept-tag{margin-top:0.8rem;padding:0.6rem 0.8rem;background:rgba(0,122,153,0.05);border:1px solid rgba(0,122,153,0.2);border-radius:8px;font-size:0.75rem;color:var(--tdim);line-height:1.6;}

@media(max-width:768px){.app{padding:0.75rem;}.compare{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav class="topbar">
  <span class="logo">Phase 6</span>
  <div class="dots" id="dots"></div>
  <span class="step-label" id="stepLabel">1/10</span>
</nav>

<div class="app">

<header class="header">
  <div class="badge">⬜ NEXT</div>
  <h1>Preference Alignment (DPO)</h1>
  <p>Align model responses with human preferences — safe, helpful, honest</p>
</header>

<div class="chips" id="chips"></div>
<div class="fun-fact" id="funFact"><span style="font-size:1.3rem;">💡</span><span id="funFactText"></span></div>
<div id="slideContainer"></div>

<div class="nav-row">
  <button class="nav-btn" id="prevBtn" onclick="goTo(cur-1)">← Previous</button>
  <button class="nav-btn primary" id="nextBtn" onclick="goTo(cur+1)">Next →</button>
</div>

</div>

<script>
const slides=[
{id:'6.1',title:'RLHF — The Original (Complex) Way',
fact:'RLHF was invented at OpenAI in 2017 and used to create ChatGPT. It requires training a SEPARATE reward model.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.1</span> RLHF — Reinforcement Learning from Human Feedback</h2>
<p>The original method. Two models: a reward model that learns human preferences, and an LLM that optimizes against it.</p>
<div class="compare">
  <div class="cmp-card left"><h4 style="color:var(--red);">RLHF Problems</h4><p>Needs separate reward model (2x GPU). PPO is unstable. Reward model can be "gamed."</p></div>
  <div class="cmp-card right"><h4 style="color:var(--green);">DPO Solution (2023)</h4><p>No reward model. Single model. Directly learns from preference pairs. Simpler, faster, more stable.</p></div>
</div></div></div>`},
{id:'6.2',title:'DPO — Direct Preference Optimization',
fact:'DPO was invented at Stanford in 2023. The paper has 2000+ citations. It replaced RLHF as the standard.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.2</span> How DPO Works — Pairs of Responses</h2>
<p>DPO learns from <strong>pairs</strong> — one preferred response, one rejected.</p>
<table style="width:100%;border-collapse:collapse;font-size:0.85rem;margin:1rem 0;">
<thead><tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.4rem;">Prompt</th><th style="text-align:left;padding:0.4rem;color:var(--green);">Chosen</th><th style="text-align:left;padding:0.4rem;color:var(--red);">Rejected</th></tr></thead>
<tbody>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem;">What is Metformin?</td><td style="padding:0.4rem;">Metformin is an oral medication used to treat type 2 diabetes. It belongs to the biguanide class...</td><td style="padding:0.4rem;">Metformin is a drug. You take it. It helps with sugar.</td></tr>
</tbody></table>
<div class="callout"><strong>What DPO learns:</strong> "Be thorough, accurate, helpful. Not dismissive, lazy, or rude."</div>
</div></div>`},
{id:'6.3',title:'DPO Loss — Simplified',
fact:'The DPO loss is elegant: cross-entropy between chosen and rejected probabilities.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.3</span> What DPO Actually Optimizes</h2>
<div class="code-box">
<span style="color:#6a9955;">DPO Loss (simplified):</span>
Loss = -log( sigma( beta * (log P(chosen) - log P(rejected)) ) )

<span style="color:#6a9955;">In plain English:</span>
  "If model prefers BAD over GOOD -> HIGH penalty.
   If model prefers GOOD over BAD -> LOW penalty."

<span style="color:#6a9955;">beta = temperature (0.1-0.5)</span>
  Low beta (0.1): mild preference, slow change
  High beta (0.5): strong preference, faster change</div>
</div></div>`},
{id:'6.4',title:'Preference Data Format',
fact:'A DPO dataset has 10K-50K pairs. Each pair = one prompt, two responses, one judgment.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.4</span> Prepare Preference Data</h2>
<p>Three keys: <strong>prompt</strong>, <strong>chosen</strong> (good answer), <strong>rejected</strong> (bad answer).</p>
<div class="code-box">
<span style="color:#6a9955;">DPO data format:</span>
preference_data = [
    {"prompt": "What is Metformin?",
     "chosen": "Metformin is an oral medication used to treat type 2 diabetes...",
     "rejected": "Metformin is a diabetes drug. It helps with sugar."},
    # ... 50-100 pairs
]</div>
</div></div>`},
{id:'6.5',title:'Load Model + Merge + Fresh LoRA',
fact:'Phase 3.10 applies again! Merge instruction adapter BEFORE DPO training.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.5</span> Start from Instruction-Tuned Model</h2>
<div class="code-box">
<span style="color:#6a9955;">Load base + Phase 5 adapter + merge + fresh LoRA</span>
import torch
from transformers import AutoModelForCausalLM, BitsAndBytesConfig
from peft import PeftModel, LoraConfig, get_peft_model, prepare_model_for_kbit_training

bnb_config = BitsAndBytesConfig(load_in_8bit=True)
base = AutoModelForCausalLM.from_pretrained(
    "TinyLlama/TinyLlama-1.1B-Chat-v1.0",
    quantization_config=bnb_config, device_map="auto", torch_dtype=torch.float16
)
model = PeftModel.from_pretrained(base, "./instruction_tuned_adapter")
model = model.merge_and_unload()  # Phase 3.10!
model = prepare_model_for_kbit_training(model)
lora_config = LoraConfig(r=8, lora_alpha=16, target_modules=["q_proj","v_proj"])
model = get_peft_model(model, lora_config)</div>
</div></div>`},
{id:'6.6',title:'DPOTrainer from TRL',
fact:'DPOTrainer is from TRL — same API as SFTTrainer. Same .train() call.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.6</span> DPOTrainer — Configure and Train</h2>
<div class="code-box">
from trl import DPOTrainer
from transformers import TrainingArguments
from datasets import Dataset

dataset = Dataset.from_list(preference_data)
training_args = TrainingArguments(
    output_dir="./dpo_aligned", num_train_epochs=3,
    per_device_train_batch_size=4, learning_rate=5e-5, logging_steps=10,
)
trainer = DPOTrainer(
    model=model, train_dataset=dataset,
    tokenizer=tokenizer, args=training_args, beta=0.1,
)
trainer.train()</div>
<div class="callout"><strong>lr=5e-5:</strong> Smaller than SFT (2e-4). DPO adjusts preferences, not teaches new knowledge.</div>
</div></div>`},
{id:'6.7',title:'DPO vs SFT — What Changes',
fact:'SFT teaches WHAT to say. DPO teaches HOW to say it. Same content, different delivery.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.7</span> SFT vs DPO Output Comparison</h2>
<table style="width:100%;border-collapse:collapse;font-size:0.85rem;margin:1rem 0;">
<thead><tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.4rem;">Prompt</th><th style="text-align:left;padding:0.4rem;color:var(--amber);">After SFT</th><th style="text-align:left;padding:0.4rem;color:var(--green);">After DPO</th></tr></thead>
<tbody>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem;">What is Metformin?</td><td style="padding:0.4rem;">"Metformin is a biguanide used to treat type 2 diabetes."<br><span style="color:var(--amber);">Correct but brief</span></td><td style="padding:0.4rem;">"Metformin is an oral medication belonging to the biguanide class. It treats type 2 diabetes by reducing hepatic glucose production and improving insulin sensitivity."<br><span style="color:var(--green);">Thorough + accurate</span></td></tr>
</tbody></table>
<p>Same information. <strong>Better delivery.</strong></p>
</div></div>`},
{id:'6.8',title:'RLAIF — AI Feedback (No Humans)',
fact:'Anthropic uses RLAIF to train Claude. AI judges responses. $0.001/pair vs $1-5 for humans.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.8</span> RLAIF — AI Feedback at Scale</h2>
<div class="compare">
  <div class="cmp-card left"><h4 style="color:var(--amber);">RLHF (Human)</h4><p>$1-5/pair. Days. Does not scale.</p></div>
  <div class="cmp-card right"><h4 style="color:var(--green);">RLAIF (AI)</h4><p>$0.001/pair. Minutes. GPT-4o judges. Nearly as good.</p></div>
</div>
<div class="code-box">
<span style="color:#6a9955;">GPT-4o as judge:</span>
def ai_preference(prompt, a, b):
    result = openai.chat.completions.create(
        model="gpt-4o",
        messages=[{"role":"user","content":f"Which is better? {prompt} A:{a} B:{b}"}]
    )
    return "A" if "A" in result.choices[0].message.content else "B"</div>
</div></div>`},
{id:'Notebook',title:'Colab Notebook — 5 Cells for Phase 6',
fact:'DPO training is fast — 50-100 preference pairs train in under 5 minutes on T4 GPU.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">Notebook</span> Phase 6 Colab — 5 Cells</h2>
<p>Each CELL = one Colab code cell.</p>
<div class="code-box">
<span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 1</span> — Install + Data

!pip install -q transformers datasets peft bitsandbytes accelerate trl

preference_data = [
    {"prompt": "What is Metformin?", "chosen": "Metformin is an oral medication used to treat type 2 diabetes. It belongs to the biguanide class and works by reducing hepatic glucose production.", "rejected": "Metformin is a diabetes drug. It helps with sugar."},
    {"prompt": "How does Metformin work?", "chosen": "Metformin decreases hepatic glucose production and improves peripheral insulin sensitivity.", "rejected": "It just works."},
    {"prompt": "What are side effects?", "chosen": "Common side effects include nausea, vomiting, and diarrhea. These usually subside after 1-2 weeks.", "rejected": "It might make your stomach hurt."},
    {"prompt": "When is it contraindicated?", "chosen": "Metformin is contraindicated in patients with severe renal impairment (eGFR < 30) or acute metabolic acidosis.", "rejected": "Don't take it if your kidneys are bad."},
    {"prompt": "What class is Metformin?", "chosen": "Metformin belongs to the biguanide class. It is the only biguanide available for clinical use.", "rejected": "It's a biguanide. That's it."},
]</div>
<div class="code-box">
<span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 2</span> — Load Model

import torch
from transformers import AutoModelForCausalLM, AutoTokenizer, BitsAndBytesConfig
model_name = "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
tokenizer = AutoTokenizer.from_pretrained(model_name); tokenizer.pad_token = tokenizer.eos_token
bnb_config = BitsAndBytesConfig(load_in_8bit=True)
model = AutoModelForCausalLM.from_pretrained(model_name, quantization_config=bnb_config, device_map="auto", torch_dtype=torch.float16)
model.config.use_cache = False</div>
<div class="code-box">
<span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 3</span> — Apply LoRA

from peft import LoraConfig, get_peft_model, prepare_model_for_kbit_training
model = prepare_model_for_kbit_training(model)
lora_config = LoraConfig(r=8, lora_alpha=16, lora_dropout=0.1, target_modules=["q_proj","v_proj"])
model = get_peft_model(model, lora_config)
model.print_trainable_parameters()</div>
<div class="code-box">
<span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 4</span> — DPOTrainer

from transformers import TrainingArguments
from trl import DPOTrainer
from datasets import Dataset
dataset = Dataset.from_list(preference_data)
training_args = TrainingArguments(output_dir="./dpo_aligned", num_train_epochs=3, per_device_train_batch_size=4, learning_rate=5e-5, logging_steps=5)
trainer = DPOTrainer(model=model, train_dataset=dataset, tokenizer=tokenizer, args=training_args, beta=0.1)
trainer.train()</div>
<div class="code-box">
<span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 5</span> — Test!

from transformers import pipeline
pipe = pipeline("text-generation", model=model, tokenizer=tokenizer)
result = pipe("### Instruction:\nWhat is Metformin?\n\n### Response:\n", max_new_tokens=100)
print(result[0]["generated_text"])</div>
<div class="callout"><strong>5 cells.</strong> DPO is simpler than SFT — no formatting function. Just pairs of good vs bad responses.</div>
</div></div>`}
];
let cur=0; const visited=new Set([0]);

function render(i){
  cur=i;visited.add(i);
  document.getElementById('slideContainer').innerHTML=slides[i].render();
  document.getElementById('stepLabel').textContent=`${i+1}/${slides.length}`;
  document.getElementById('funFactText').innerHTML=`<strong>${slides[i].id}:</strong> ${slides[i].fact}`;
  document.getElementById('dots').innerHTML=slides.map((_,j)=>`<div class="dot ${j===cur?'active':visited.has(j)?'done':''}" onclick="goTo(${j})"></div>`).join('');
  document.getElementById('chips').innerHTML=slides.map((s,j)=>`<span class="chip ${j===cur?'current':visited.has(j)?'visited':''}" onclick="goTo(${j})">${s.id}</span>`).join('');
  document.getElementById('prevBtn').disabled=i===0;
  const nb=document.getElementById('nextBtn');
  if(i===slides.length-1){nb.textContent='✓ Complete';nb.style.background='var(--green)';}
  else{nb.textContent='Next →';nb.style.background='var(--violet)';nb.style.color='#fff';}

  // Map slides to their CELL numbers for consistent labels
  const cellMap={
    'Setup':1, '5.2':2, '5.3':3, '5.5':4, '5.7':5, '5.10':6,
    'Notebook':null // Notebook slide has its own labels
  };

  // Add concept tags + copy buttons
  setTimeout(()=>{
    const currentSlide=slides[cur];
    const cellStart=cellMap[currentSlide.id]||0;

    document.querySelectorAll('.code-box').forEach((box,idx)=>{
      if(!box.parentElement.querySelector('.cell-num')){
        const num=document.createElement('div');
        num.className='cell-num';
        num.style.cssText='font-family:"Space Grotesk",sans-serif;font-size:0.6rem;font-weight:700;color:#fff;background:var(--violet);display:inline-block;padding:0.2em 0.7em;border-radius:4px 4px 0 0;margin-bottom:-1px;letter-spacing:0.06em;';
        const cellNum=cellStart>0?`CELL ${cellStart}`:`📋 Code ${idx+1}`;
        num.textContent=cellNum+' — Copy into Colab';
        box.parentNode.insertBefore(num,box);
      }
      if(!box.parentElement.querySelector('.copy-btn')&&!box.querySelector('.copy-btn')){
        const btn=document.createElement('button');btn.className='copy-btn';btn.textContent='📋 Copy';
        btn.onclick=function(){
          const clone=box.cloneNode(true);clone.querySelectorAll('.copy-btn,.cell-num').forEach(b=>b.remove());
          navigator.clipboard.writeText(clone.textContent||clone.innerText||'').then(()=>{btn.textContent='✓ Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 Copy';btn.classList.remove('copied');},2000);});
        };
        box.style.position='relative';box.appendChild(btn);
      }
    });
  },50);

  // Add concept reference tags
  setTimeout(()=>{
    const concepts={
      'Setup':'🧠 Phase 5 uses SFTTrainer from TRL library — same as Phase 4 Trainer but designed for instruction data. No PDF download needed. We write Q&A pairs directly.',
      '5.1':'🧠 Phase 4 vs Phase 5: Phase 4 data = {"text":"..."} (raw). Phase 5 data = {"instruction":"...","output":"..."} (Q&A). This is the instructional data type from Phase 1.6.',
      '5.2':'🧠 Phase 1.6: Instructional data format. Instead of raw text, each example has instruction+input+output. You can manually write Q&A or use GPT-4o (Phase 5b) to generate them.',
      '5.3':'🧠 Phase 1.2: Pre-training vs Fine-tuning. The model was pre-trained on raw text. Now we fine-tune on formatted Q&A. The ### markers are boundary tokens — like the 3-stage pipeline from Phase 1.1.',
      '5.4':'🧠 Phase 5b preview: Synthetic data generation. GPT-4o reads your PDF chunks and generates Q&A pairs. Same concept: AI generates training data for AI. Covered in detail in Phase 5b.',
      '5.5':'🧠 Phase 3.10: The Golden Rule! Merge domain adapter BEFORE starting instruction tuning. If you skip this, the instruction LoRA learns to fix domain LoRA errors — not base model errors. Catastrophic drift.',
      '5.6':'🧠 Phase 3.10 in action: merge_and_unload() between stages. Same pattern: apply LoRA → train → merge → save. Each stage starts from a CLEAN merged model. Phase 6 (DPO) will follow the same pattern.',
      '5.7':'🧠 Phase 4.8-4.9: SFTTrainer = Trainer + instruction formatting. Same TrainingArguments (lr, epochs, batch size). Same forward→loss→backward→update loop. Same Adam optimizer. New: formatting_func for Alpaca template.',
      '5.8':'🧠 Phase 4.5 connection: labels = input_ids.copy(). Phase 4: ALL tokens are labels. Phase 5: ONLY response tokens are labels (instruction tokens get -100 = ignored). Same self-supervised idea, more focused.',
      '5.9':'🧠 Phase 1.1-1.2 connection: Base model = pre-training (pattern completion). Domain model = domain adaptation (knows the words). Instruction model = SFT (answers questions). Three stages, three behaviors.',
      '5.10':'🧠 Level 4 Deployment Guide: push_to_hub() shares your adapter. Merged model = no LoRA dependency. Anyone can download and use. Same pattern as Phase 4.10 but now for instruction-tuned model.'
    };
    document.querySelectorAll('.card').forEach(card=>{
      const h2=card.querySelector('h2');if(!h2)return;
      const numEl=h2.querySelector('.num');if(!numEl||card.querySelector('.concept-tag'))return;
      const stepId=numEl.textContent.trim();
      if(concepts[stepId]){
        const tag=document.createElement('div');tag.className='concept-tag';
        tag.innerHTML=concepts[stepId];card.appendChild(tag);
      }
    });
  },60);

  document.getElementById('slideContainer').scrollIntoView({behavior:'smooth',block:'start'});
}

function goTo(i){if(i<0||i>=slides.length)return;render(i);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'&&cur<slides.length-1)goTo(cur+1);if(e.key==='ArrowLeft'&&cur>0)goTo(cur-1);});
render(0);
</script>
</body>
</html>
