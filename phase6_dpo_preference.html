<script>
const slides=[
{id:'6.1',title:'RLHF — The Original (Complex) Way',
fact:'RLHF was invented at OpenAI in 2017 and used to create ChatGPT. It requires training a SEPARATE reward model — doubling the compute. DPO (2023) replaced it with a single-model approach.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.1</span> RLHF — Reinforcement Learning from Human Feedback</h2>
<p>The original method. Two models. One trains a reward function. The other optimizes against it. Complex and expensive.</p>

<div class="flow" style="display:flex;align-items:center;gap:0.3rem;flex-wrap:wrap;justify-content:center;margin:1rem 0;font-family:'Space Grotesk',sans-serif;font-size:0.65rem;">
  <div style="background:var(--raised);padding:0.5rem;border-radius:6px;">Human raters<br>compare responses</div><span>→</span>
  <div style="background:var(--raised);padding:0.5rem;border-radius:6px;">Train<br>Reward Model</div><span>→</span>
  <div style="background:var(--raised);padding:0.5rem;border-radius:6px;">PPO algorithm<br>optimizes LLM</div><span>→</span>
  <div style="background:rgba(26,110,52,0.08);padding:0.5rem;border-radius:6px;border:1px solid var(--green);">Aligned<br>Model</div>
</div>

<div class="compare">
  <div class="cmp-card left"><h4 style="color:var(--red);">❌ RLHF Problems</h4>
    <p style="font-size:0.82rem;">Needs separate reward model (2× GPU). PPO is unstable in training. Reward model can be "gamed" by the LLM.</p>
  </div>
  <div class="cmp-card right"><h4 style="color:var(--green);">✅ DPO Solution (2023)</h4>
    <p style="font-size:0.82rem;">No reward model needed. Single model. Directly learns from preference pairs. Simpler, faster, more stable.</p>
  </div>
</div>
</div></div>`},
{id:'6.2',title:'DPO — Direct Preference Optimization',
fact:'DPO was invented at Stanford in 2023. The paper "Direct Preference Optimization" has 2000+ citations in 2 years. It replaced RLHF as the standard for preference alignment.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.2</span> DPO — Skip the Reward Model, Go Direct</h2>
<p>DPO learns directly from <strong>pairs</strong> of responses — one preferred, one rejected. No need to train a separate reward model.</p>

<table style="width:100%;border-collapse:collapse;font-size:0.85rem;margin:1rem 0;">
<thead><tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.4rem;">Prompt</th><th style="text-align:left;padding:0.4rem;color:var(--green);">Chosen (👍)</th><th style="text-align:left;padding:0.4rem;color:var(--red);">Rejected (👎)</th></tr></thead>
<tbody>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem;">What is Metformin?</td><td style="padding:0.4rem;">Metformin is an oral medication used to treat type 2 diabetes. It works by reducing glucose production...</td><td style="padding:0.4rem;">Metformin is a drug. You take it. It helps with sugar. End of story.</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem;">Side effects?</td><td style="padding:0.4rem;">Common side effects include nausea, vomiting, and diarrhea. These usually subside after the first week...</td><td style="padding:0.4rem;">It might make your stomach hurt. Deal with it.</td></tr>
</tbody>
</table>

<div class="callout">
<strong>🧠 What DPO learns:</strong> "The chosen response is BETTER than the rejected one." After seeing hundreds of such pairs, the model internalizes: be thorough, be accurate, be helpful. Don't be dismissive, don't be lazy, don't be rude.
</div>
</div></div>`},
{id:'6.3',title:'DPO Loss — The Formula (Simplified)',
fact:'The DPO loss function is elegant: it's just cross-entropy loss between the chosen and rejected responses, scaled by how much the model prefers one over the other.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.3</span> What DPO Actually Optimizes</h2>
<p>Don't worry about the math — focus on what it means.</p>

<div class="code-box">
<span style="color:#6a9955;">DPO Loss (simplified):</span>

Loss = -log( σ( β × (log P_model(chosen) - log P_model(rejected)) ) )

<span style="color:#6a9955;">Where:</span>
  σ = sigmoid (squishes to 0-1)
  β = temperature (0.1-0.5, controls how "strong" the preference is)
  P_model(chosen) = how likely the model thinks the chosen response is
  P_model(rejected) = how likely the model thinks the rejected response is

<span style="color:#6a9955;">In plain English:</span>
  "If the model prefers the BAD response over the GOOD one → HIGH penalty.
   If the model prefers the GOOD response over the BAD one → LOW penalty.
   Push the model to ALWAYS prefer the good response."</div>

<div class="callout">
<strong>🧠 Compare to QAT loss:</strong> QAT loss = (fake_W - real_W)² + 0.08×(W - W₀)². DPO loss is different — it compares TWO probabilities (chosen vs rejected). But both are minimized via the same gradient descent you already understand.
</div>
</div></div>`},
{id:'6.4',title:'Preference Data Format',
fact:'The DPO dataset typically has 10K-50K preference pairs. Each pair = one prompt, two responses, and one human judgment saying which is better.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.4</span> Prepare Preference Data — prompt, chosen, rejected</h2>
<p>Create pairs of responses for the same prompt. Label which one a human preferred.</p>

<div class="code-box">
<span style="color:#6a9955;"># DPO data format</span>
preference_data = [
    {
        <span style="color:#ce9178;">"prompt"</span>: <span style="color:#ce9178;">"What is Metformin?"</span>,
        <span style="color:#ce9178;">"chosen"</span>: <span style="color:#ce9178;">"Metformin is an oral medication used to treat type 2 diabetes. It belongs to the biguanide class and works by reducing hepatic glucose production."</span>,
        <span style="color:#ce9178;">"rejected"</span>: <span style="color:#ce9178;">"Metformin is a diabetes drug. It helps with sugar."</span>
    },
    {
        <span style="color:#ce9178;">"prompt"</span>: <span style="color:#ce9178;">"How does Metformin work?"</span>,
        <span style="color:#ce9178;">"chosen"</span>: <span style="color:#ce9178;">"Metformin decreases hepatic glucose production and improves peripheral insulin sensitivity. It also reduces intestinal glucose absorption."</span>,
        <span style="color:#ce9178;">"rejected"</span>: <span style="color:#ce9178;">"It just works. Don't overthink it."</span>
    },
    <span style="color:#6a9955;"># ... 50-100 such pairs for a small dataset</span>
]

<span style="color:#6a9955;"># The pattern: chosen = detailed + accurate + helpful</span>
<span style="color:#6a9955;">#             rejected = short + dismissive + lazy</span></div>

</div></div>`},
{id:'6.5',title:'Load Phase 5 Model + Merge + Fresh LoRA',
fact:'Phase 3.10 applies again! Merge the instruction adapter BEFORE DPO training. Otherwise the DPO adapter learns to compensate for instruction adapter errors.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.5</span> Start from Instruction-Tuned Model</h2>
<p>Same pattern as Phase 5: load previous stage → merge → fresh LoRA → train.</p>

<div class="code-box">
<span style="color:#6a9955;"># Step 1: Load base + Phase 5 instruction adapter</span>
<span style="color:#569cd6;">import</span> torch
<span style="color:#569cd6;">from</span> transformers <span style="color:#569cd6;">import</span> AutoModelForCausalLM, BitsAndBytesConfig
<span style="color:#569cd6;">from</span> peft <span style="color:#569cd6;">import</span> PeftModel, LoraConfig, get_peft_model, prepare_model_for_kbit_training

bnb_config = BitsAndBytesConfig(load_in_8bit=<span style="color:#569cd6;">True</span>)
base = AutoModelForCausalLM.from_pretrained(
    <span style="color:#ce9178;">"TinyLlama/TinyLlama-1.1B-Chat-v1.0"</span>,
    quantization_config=bnb_config, device_map=<span style="color:#ce9178;">"auto"</span>, torch_dtype=torch.float16
)
model = PeftModel.from_pretrained(base, <span style="color:#ce9178;">"./instruction_tuned_adapter"</span>)

<span style="color:#6a9955;"># Step 2: MERGE — Phase 3.10 Golden Rule!</span>
model = model.merge_and_unload()

<span style="color:#6a9955;"># Step 3: Fresh LoRA for DPO</span>
model = prepare_model_for_kbit_training(model)
lora_config = LoraConfig(r=<span style="color:#ce9178;">8</span>, lora_alpha=<span style="color:#ce9178;">16</span>, lora_dropout=<span style="color:#ce9178;">0.1</span>, target_modules=[<span style="color:#ce9178;">"q_proj"</span>,<span style="color:#ce9178;">"v_proj"</span>])
model = get_peft_model(model, lora_config)</div>

</div></div>`},
{id:'6.6',title:'DPOTrainer — Configure and Train',
fact:'DPOTrainer is from the same TRL library as SFTTrainer. Same API pattern — configure, call .train(), done. The beta parameter (0.1-0.5) controls how strongly the model prefers chosen over rejected.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.6</span> DPOTrainer from TRL</h2>

<div class="code-box">
<span style="color:#569cd6;">from</span> trl <span style="color:#569cd6;">import</span> DPOTrainer
<span style="color:#569cd6;">from</span> transformers <span style="color:#569cd6;">import</span> TrainingArguments
<span style="color:#569cd6;">from</span> datasets <span style="color:#569cd6;">import</span> Dataset

dataset = Dataset.from_list(preference_data)

training_args = TrainingArguments(
    output_dir=<span style="color:#ce9178;">"./dpo_aligned"</span>,
    num_train_epochs=<span style="color:#ce9178;">3</span>,
    per_device_train_batch_size=<span style="color:#ce9178;">4</span>,
    learning_rate=<span style="color:#ce9178;">5e-5</span>,           <span style="color:#6a9955;"># DPO uses smaller lr than SFT (5e-5 vs 2e-4)</span>
    logging_steps=<span style="color:#ce9178;">10</span>,
)

trainer = DPOTrainer(
    model=model,
    train_dataset=dataset,
    tokenizer=tokenizer,
    args=training_args,
    beta=<span style="color:#ce9178;">0.1</span>,                 <span style="color:#6a9955;"># Preference strength (0.1-0.5)</span>
)

trainer.train()
print(<span style="color:#ce9178;">"✅ DPO training complete!"</span>)</div>

<div class="callout">
<strong>🧠 beta=0.1:</strong> Mild preference. "Chosen is a BIT better." Safe, slow change.<br>
<strong>🧠 beta=0.5:</strong> Strong preference. "Chosen is WAY better." Faster, bigger change.
</div>
</div></div>`},
{id:'6.7',title:'What DPO Training Looks Like',
fact:'DPO typically converges faster than SFT — 200-500 steps vs 1000+. You\'re adjusting preferences, not teaching new knowledge.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.7</span> DPO Training — Under the Hood</h2>
<p>Each step, the model sees a prompt + two responses. It computes how likely it thinks each response is. The loss pushes it to increase the probability of the chosen response and decrease the rejected one.</p>

<div class="code-box">
<span style="color:#6a9955;">One DPO training step:</span>

  Step 1: Model reads prompt "What is Metformin?"
  Step 2: Model computes P(chosen) = probability of the good answer
  Step 3: Model computes P(rejected) = probability of the bad answer
  Step 4: Loss = -log(σ(β × (log P(chosen) - log P(rejected))))
  Step 5: Gradient pushes model to increase P(chosen), decrease P(rejected)

<span style="color:#6a9955;">After training:</span>
  Model assigns HIGH probability to thorough, accurate responses
  Model assigns LOW probability to dismissive, lazy responses</div>

<div class="callout">
<strong>🧠 Compare to SFT:</strong> SFT teaches "what to say" (content). DPO teaches "how to say it" (tone, thoroughness, helpfulness). SFT + DPO = a model that knows the right answer AND delivers it the right way.
</div>
</div></div>`},
{id:'6.8',title:'Compare: SFT vs DPO Model',
fact:'SFT model knows the answer but might be lazy. DPO model knows the answer AND delivers it thoroughly. The difference is subtle but crucial for user experience.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.8</span> Before DPO vs After DPO</h2>

<table style="width:100%;border-collapse:collapse;font-size:0.85rem;margin:1rem 0;">
<thead><tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.4rem;">Prompt</th><th style="text-align:left;padding:0.4rem;color:var(--amber);">After SFT (Phase 5)</th><th style="text-align:left;padding:0.4rem;color:var(--green);">After DPO (Phase 6)</th></tr></thead>
<tbody>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem;">What is Metformin?</td><td style="padding:0.4rem;">"Metformin is a biguanide used to treat type 2 diabetes."<br><span style="color:var(--amber);">Correct but brief</span></td><td style="padding:0.4rem;">"Metformin is an oral medication that belongs to the biguanide class. It is primarily used to treat type 2 diabetes mellitus by reducing hepatic glucose production and improving insulin sensitivity."<br><span style="color:var(--green);">Thorough + accurate</span></td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem;">Side effects?</td><td style="padding:0.4rem;">"Nausea, vomiting."<br><span style="color:var(--amber);">Too brief</span></td><td style="padding:0.4rem;">"Common side effects include gastrointestinal issues such as nausea, vomiting, and diarrhea. These typically subside after 1-2 weeks."<br><span style="color:var(--green);">Detailed + helpful</span></td></tr>
</tbody>
</table>

<p><strong>The difference:</strong> SFT taught the model the right answer. DPO taught it to be <strong>thorough</strong> instead of lazy. The information is the same — the delivery changed.</p>
</div></div>`},
{id:'6.9',title:'RLAIF — AI Feedback (No Humans Needed)',
fact:'Anthropic uses RLAIF (AI feedback) to train Claude. Instead of humans comparing responses, another LLM does the comparison. This scales to millions of preference pairs at near-zero cost.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6.9</span> RLAIF — When Humans Are Too Expensive</h2>
<p>Human feedback doesn't scale. Paying people to compare responses costs $1-5 per comparison. For 100K pairs = $500K. AI feedback costs $0.001 per comparison.</p>

<div class="compare">
  <div class="cmp-card left"><h4 style="color:var(--amber);">RLHF (Human Feedback)</h4>
    <p style="font-size:0.82rem;">Humans compare responses. Expensive ($1-5/pair). Slow (days). But gold standard.</p>
  </div>
  <div class="cmp-card right"><h4 style="color:var(--green);">RLAIF (AI Feedback)</h4>
    <p style="font-size:0.82rem;">GPT-4o/Claude compares responses. Cheap ($0.001/pair). Fast (minutes). Nearly as good.</p>
  </div>
</div>

<div class="code-box">
<span style="color:#6a9955;"># RLAIF: Use GPT-4o to judge which response is better</span>
<span style="color:#6a9955;"># This is how Anthropic trains Claude — AI feedback, not human feedback</span>

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">ai_preference</span>(prompt, response_a, response_b):
    judge_prompt = <span style="color:#ce9178;">f"""Which response is better? Choose A or B.

    Prompt: {prompt}
    Response A: {response_a}
    Response B: {response_b}

    Better response:"""</span>

    result = openai.chat.completions.create(
        model=<span style="color:#ce9178;">"gpt-4o"</span>,
        messages=[{<span style="color:#ce9178;">"role"</span>: <span style="color:#ce9178;">"user"</span>, <span style="color:#ce9178;">"content"</span>: judge_prompt}]
    )
    <span style="color:#569cd6;">return</span> <span style="color:#ce9178;">"A"</span> <span style="color:#569cd6;">if</span> <span style="color:#ce9178;">"A"</span> <span style="color:#569cd6;">in</span> result.choices[0].message.content <span style="color:#569cd6;">else</span> <span style="color:#ce9178;">"B"</span></div>

</div></div>`},
{id:'Notebook',title:'Colab Notebook — 5 Cells for Phase 6',
fact:'DPO training is fast — 50-100 preference pairs train in under 5 minutes on T4 GPU.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">📓</span> Phase 6 Colab — Cell by Cell</h2>
<p>Each <span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL</span> = one Colab code cell. <strong>📋 Copy</strong> → paste → Ctrl+Enter.</p>

<div class="code-box">
<span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 1</span> <span style="color:#6a9955;">— Install + Preference Data</span>

!pip install -q transformers datasets peft bitsandbytes accelerate trl

preference_data = [
    {"prompt": "What is Metformin?", "chosen": "Metformin is an oral medication used to treat type 2 diabetes. It belongs to the biguanide class and works by reducing hepatic glucose production and improving insulin sensitivity.", "rejected": "Metformin is a diabetes drug. It helps with sugar."},
    {"prompt": "How does Metformin work?", "chosen": "Metformin decreases hepatic glucose production and improves peripheral insulin sensitivity. It also reduces intestinal absorption of glucose.", "rejected": "It just works. Don't overthink it."},
    {"prompt": "What are side effects?", "chosen": "Common side effects include nausea, vomiting, and diarrhea. These usually subside after 1-2 weeks. Rarely, lactic acidosis can occur.", "rejected": "It might make your stomach hurt."},
    {"prompt": "When is it contraindicated?", "chosen": "Metformin is contraindicated in patients with severe renal impairment (eGFR < 30), acute metabolic acidosis, or hypersensitivity to the drug.", "rejected": "Don't take it if your kidneys are bad."},

<div class="code-box">
<span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 2</span> <span style="color:#6a9955;">— Load Model + Tokenizer</span>

import torch
from transformers import AutoModelForCausalLM, AutoTokenizer, BitsAndBytesConfig

model_name = "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
tokenizer = AutoTokenizer.from_pretrained(model_name)
tokenizer.pad_token = tokenizer.eos_token

bnb_config = BitsAndBytesConfig(load_in_8bit=True)
model = AutoModelForCausalLM.from_pretrained(model_name, quantization_config=bnb_config, device_map="auto", torch_dtype=torch.float16)
model.config.use_cache = False
print("✅ Model loaded")</div>

<div class="code-box">
<span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 3</span> <span style="color:#6a9955;">— Apply LoRA</span>

from peft import LoraConfig, get_peft_model, prepare_model_for_kbit_training

model = prepare_model_for_kbit_training(model)
lora_config = LoraConfig(r=8, lora_alpha=16, lora_dropout=0.1, target_modules=["q_proj","v_proj"], bias="none", task_type="CAUSAL_LM")
model = get_peft_model(model, lora_config)
model.print_trainable_parameters()</div>

<div class="code-box">
<span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 4</span> <span style="color:#6a9955;">— DPOTrainer</span>

from transformers import TrainingArguments
from trl import DPOTrainer
from datasets import Dataset

dataset = Dataset.from_list(preference_data)

training_args = TrainingArguments(
    output_dir="./dpo_aligned", num_train_epochs=3,
    per_device_train_batch_size=4, learning_rate=5e-5,
    logging_steps=5,
)

trainer = DPOTrainer(
    model=model, train_dataset=dataset,
    tokenizer=tokenizer, args=training_args, beta=0.1,
)

trainer.train()
print("✅ DPO training complete!")</div>

from transformers import pipeline

pipe = pipeline("text-generation", model=model, tokenizer=tokenizer)

result = pipe(prompt, max_new_tokens=100, temperature=0.7)

let cur=0; const visited=new Set([0]);

function render(i){
  cur=i;visited.add(i);
  document.getElementById('slideContainer').innerHTML=slides[i].render();
  document.getElementById('stepLabel').textContent=`${i+1}/${slides.length}`;
  document.getElementById('funFactText').innerHTML=`<strong>${slides[i].id}:</strong> ${slides[i].fact}`;
  document.getElementById('dots').innerHTML=slides.map((_,j)=>`<div class="dot ${j===cur?'active':visited.has(j)?'done':''}" onclick="goTo(${j})"></div>`).join('');
  document.getElementById('chips').innerHTML=slides.map((s,j)=>`<span class="chip ${j===cur?'current':visited.has(j)?'visited':''}" onclick="goTo(${j})">${s.id}</span>`).join('');
  document.getElementById('prevBtn').disabled=i===0;
  const nb=document.getElementById('nextBtn');
  if(i===slides.length-1){nb.textContent='✓ Complete';nb.style.background='var(--green)';}
  else{nb.textContent='Next →';nb.style.background='var(--violet)';nb.style.color='#fff';}
  document.getElementById('slideContainer').scrollIntoView({behavior:'smooth',block:'start'});
}

function goTo(i){if(i<0||i>=slides.length)return;render(i);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'&&cur<slides.length-1)goTo(cur+1);if(e.key==='ArrowLeft'&&cur>0)goTo(cur-1);});
render(0);
</script>
