<script>
const slides=[
{id:'5.1',title:'Instruction Data Formats — Alpaca vs ChatML',
fact:'The Alpaca format was created by Stanford researchers who used GPT-3 to generate 52,000 instruction-following examples for just $500. It became the standard for open-source SFT.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">5.1</span> Instruction vs Non-Instructional — What Changes</h2>
<p>Phase 4 taught the model your <strong>domain language</strong> (what words go together). Phase 5 teaches it to <strong>follow instructions</strong> (how to answer questions).</p>

<div class="compare">
  <div class="cmp-card left"><h4>Phase 4 — Non-Instructional</h4>
    <div style="font-family:'Space Grotesk',monospace;font-size:0.7rem;line-height:1.8;background:#1e1e1e;color:#d4d4d4;padding:0.6rem;border-radius:6px;">
    {<span style="color:#ce9178;">"text"</span>: <span style="color:#ce9178;">"Metformin is a biguanide..."</span>}
    </div>
    <p style="font-size:0.75rem;margin-top:0.5rem;">Just raw text. Model learns "what words come next."</p>
  </div>
  <div class="cmp-card right"><h4>Phase 5 — Instructional (Alpaca)</h4>
    <div style="font-family:'Space Grotesk',monospace;font-size:0.7rem;line-height:1.8;background:#1e1e1e;color:#d4d4d4;padding:0.6rem;border-radius:6px;">
{<br>
&nbsp;&nbsp;<span style="color:#ce9178;">"instruction"</span>: <span style="color:#ce9178;">"What is Metformin?"</span>,<br>
&nbsp;&nbsp;<span style="color:#ce9178;">"input"</span>: <span style="color:#ce9178;">""</span>,<br>
&nbsp;&nbsp;<span style="color:#ce9178;">"output"</span>: <span style="color:#ce9178;">"Metformin is an oral diabetes medicine..."</span><br>
}
    </div>
    <p style="font-size:0.75rem;margin-top:0.5rem;">Q&A pairs. Model learns "how to answer questions."</p>
  </div>
</div>

<div class="compare" style="margin-top:1rem;">
  <div class="cmp-card left"><h4 style="color:var(--amber);">Alpaca Format</h4>
    <div style="font-family:'Space Grotesk',monospace;font-size:0.7rem;line-height:1.8;background:#1e1e1e;color:#d4d4d4;padding:0.6rem;border-radius:6px;">
### Instruction:<br>
What is Metformin used for?<br><br>
### Response:<br>
Metformin is used to treat type 2 diabetes...
    </div>
    <p style="font-size:0.72rem;margin-top:0.3rem;">Simple. 3 fields: instruction + input + output.</p>
  </div>
  <div class="cmp-card right"><h4 style="color:var(--green);">ChatML Format</h4>
    <div style="font-family:'Space Grotesk',monospace;font-size:0.7rem;line-height:1.8;background:#1e1e1e;color:#d4d4d4;padding:0.6rem;border-radius:6px;">
&lt;|system|&gt;<br>You are a medical assistant.<br>
&lt;|user|&gt;<br>What is Metformin?<br>
&lt;|assistant|&gt;<br>Metformin is a biguanide...
    </div>
    <p style="font-size:0.72rem;margin-top:0.3rem;">Multi-turn. system + user + assistant roles.</p>
  </div>
</div>
</div></div>`},
{id:'5.2',title:'Prepare Instruction Dataset from Domain PDFs',
fact:'You can use GPT-4o (or any LLM) to generate Q&A pairs from your domain PDFs. Feed it a chunk of text, ask it to generate 5 questions — instant instruction dataset.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">5.2</span> Create Instruction Dataset from Your PDF Text</h2>
<p>Turn your Metformin chunks into Q&A pairs. Either manually (for small datasets) or use an LLM to auto-generate them.</p>

<div class="code-box">
<span style="color:#6a9955;"># Method 1: Manual (for small datasets)</span>
instruction_data = [
    {
        <span style="color:#ce9178;">"instruction"</span>: <span style="color:#ce9178;">"What is Metformin?"</span>,
        <span style="color:#ce9178;">"input"</span>: <span style="color:#ce9178;">""</span>,
        <span style="color:#ce9178;">"output"</span>: <span style="color:#ce9178;">"Metformin is a biguanide antihyperglycemic agent used to treat type 2 diabetes."</span>
    },
    {
        <span style="color:#ce9178;">"instruction"</span>: <span style="color:#ce9178;">"How does Metformin work?"</span>,
        <span style="color:#ce9178;">"input"</span>: <span style="color:#ce9178;">""</span>,
        <span style="color:#ce9178;">"output"</span>: <span style="color:#ce9178;">"It decreases hepatic glucose production and improves insulin sensitivity."</span>
    },
    <span style="color:#6a9955;"># ... add more Q&A pairs</span>
]

<span style="color:#6a9955;"># Method 2: Auto-generate with GPT-4o (Phase 5b covers synthetic data)</span>
<span style="color:#6a9955;"># Feed chunk → GPT-4o → "Generate 5 Q&A pairs from this text" → JSON output</span></div>

<div class="callout">
<strong>🧠 Key difference from Phase 4:</strong> Phase 4 data was just <code>{"text": "..."}</code>. Phase 5 data has <strong>three fields</strong>: instruction (the question), input (optional context), output (the correct answer). The model learns to map instruction → output.
</div>
</div></div>`},
{id:'5.3',title:'Format as Prompt — The Alpaca Template',
fact:'The model doesn\'t see JSON. It sees one string: "### Instruction: What is Metformin? ### Response: Metformin is a biguanide..." The ### markers help the model distinguish questions from answers.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">5.3</span> Format Q&A Pairs into Training Strings</h2>
<p>The model sees ONE string, not a JSON object. We format each Q&A pair using the Alpaca template.</p>

<div class="code-box">
<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">format_instruction</span>(example):
    <span style="color:#ce9178;">"""Convert a Q&A pair into a single training string."""</span>
    <span style="color:#569cd6;">if</span> example[<span style="color:#ce9178;">"input"</span>]:
        text = <span style="color:#ce9178;">f"""Below is an instruction and input. Write a response.

### Instruction:
{example['instruction']}

### Input:
{example['input']}

### Response:
{example['output']}"""</span>
    <span style="color:#569cd6;">else</span>:
        text = <span style="color:#ce9178;">f"""Below is an instruction. Write a response.

### Instruction:
{example['instruction']}

### Response:
{example['output']}"""</span>
    <span style="color:#569cd6;">return</span> {<span style="color:#ce9178;">"text"</span>: text}

<span style="color:#6a9955;"># Example: {"instruction": "What is Metformin?", "input": "", "output": "Metformin is..."}</span>
<span style="color:#6a9955;"># Becomes:</span>
<span style="color:#6a9955;"># "Below is an instruction. Write a response.\n\n### Instruction:\nWhat is Metformin?\n\n### Response:\nMetformin is..."</span></div>

<p><strong>The ### markers</strong> are boundary tokens — they tell the model "instruction ends here, response starts here." During training, the model learns to generate text AFTER "### Response:" based on what came before it.</p>
</div></div>`},
{id:'5.4',title:'Synthetic Data Generation — GPT-4o Creates Q&A',
fact:'A single research paper (~10 pages) can generate 50–100 high-quality Q&A pairs when fed through GPT-4o. Cost: ~$1-2. This is Phase 5b in detail.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">5.4</span> Use GPT-4o to Generate Q&A from Your PDFs</h2>
<p>Feed a chunk of domain text to GPT-4o, ask it to create instruction-output pairs. You get a labeled dataset for the cost of API calls.</p>

<div class="code-box">
<span style="color:#6a9955;"># Feed each chunk to GPT-4o</span>
<span style="color:#569cd6;">import</span> openai

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">generate_qa_pairs</span>(chunk_text):
    prompt = <span style="color:#ce9178;">f"""Given this medical text, generate 5 question-answer pairs
in JSON format. Questions should test understanding of the content.

Text: {chunk_text}

Output as JSON list: [{{"instruction": "...", "output": "..."}}]"""</span>

    response = openai.chat.completions.create(
        model=<span style="color:#ce9178;">"gpt-4o"</span>,
        messages=[{<span style="color:#ce9178;">"role"</span>: <span style="color:#ce9178;">"user"</span>, <span style="color:#ce9178;">"content"</span>: prompt}]
    )
    <span style="color:#569cd6;">return</span> json.loads(response.choices[0].message.content)

<span style="color:#6a9955;"># 10 chunks × 5 Q&A each = 50 training examples</span>
<span style="color:#6a9955;"># Cost: ~$0.50 total</span></div>

<div class="callout">
<strong>⚠️ This is Phase 5b content.</strong> We'll cover synthetic data generation (Gretel, Mostly AI, Tonic) in detail later. For now, you can manually write 5–10 Q&A pairs from Metformin.pdf to test the pipeline.
</div>
</div></div>`},
{id:'5.5',title:'Load Domain-Adapted Model from Phase 4',
fact:'The key insight: Phase 5 starts from the Phase 4 model, not from scratch. The domain-adapted model already knows medical language. Instruction tuning teaches it to answer questions about that language.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">5.5</span> Start from Your Phase 4 Model — Not from Scratch</h2>
<p>Load the domain-adapted TinyLlama + your Metformin adapter. Then apply a FRESH LoRA for instruction tuning.</p>

<div class="code-box">
<span style="color:#6a9955;"># Step 1: Load base + Phase 4 domain adapter</span>
<span style="color:#569cd6;">from</span> peft <span style="color:#569cd6;">import</span> PeftModel

base = AutoModelForCausalLM.from_pretrained(
    <span style="color:#ce9178;">"TinyLlama/TinyLlama-1.1B-Chat-v1.0"</span>,
    load_in_8bit=<span style="color:#569cd6;">True</span>, device_map=<span style="color:#ce9178;">"auto"</span>
)
model = PeftModel.from_pretrained(base, <span style="color:#ce9178;">"./medical_domain_adapter"</span>)

<span style="color:#6a9955;"># Step 2: MERGE domain adapter BEFORE instruction tuning!</span>
<span style="color:#6a9955;"># (Phase 3.10 Golden Rule — merge before next stage)</span>
model = model.merge_and_unload()

<span style="color:#6a9955;"># Step 3: Apply FRESH LoRA for instruction tuning</span>
model = prepare_model_for_kbit_training(model)
lora_config = LoraConfig(r=<span style="color:#ce9178;">8</span>, lora_alpha=<span style="color:#ce9178;">16</span>, target_modules=[<span style="color:#ce9178;">"q_proj"</span>,<span style="color:#ce9178;">"v_proj"</span>])
model = get_peft_model(model, lora_config)
<span style="color:#6a9955;"># Now model = domain-adapted base + fresh instruction LoRA</span></div>

<div class="callout">
<strong>🧠 Phase 3.10 in action:</strong> You MUST merge the domain adapter before instruction tuning. Otherwise the instruction LoRA learns to fix errors from the domain LoRA — not from the base model. This is the "merge, never stack" rule.
</div>
</div></div>`},
{id:'5.6',title:'Apply LoRA Correctly — Merge Then New LoRA',
fact:'If you forget to merge, the instruction adapter learns to compensate for the domain adapter\'s errors. Over 3 stages (domain → instruction → DPO), this creates catastrophic drift — same as Phase 3.10.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">5.6</span> The Merge-Before-Next-Stage Pattern</h2>
<p>This is the most common mistake in multi-stage fine-tuning. Here's the correct pattern:</p>

<div class="code-box">
<span style="color:#6a9955;"># ✅ CORRECT — Every stage follows this pattern:</span>

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">train_stage</span>(model, data, stage_name):
    <span style="color:#ce9178;">"""Train one LoRA stage, then merge."""</span>

    <span style="color:#6a9955;"># 1. Apply fresh LoRA</span>
    lora = LoraConfig(r=<span style="color:#ce9178;">8</span>, alpha=<span style="color:#ce9178;">16</span>, ...)
    model = get_peft_model(model, lora)

    <span style="color:#6a9955;"># 2. Train this stage</span>
    trainer = Trainer(model=model, train_dataset=data, ...)
    trainer.train()

    <span style="color:#6a9955;"># 3. MERGE — bake adapter into weights</span>
    model = model.merge_and_unload()

    <span style="color:#6a9955;"># 4. Save the merged checkpoint</span>
    model.save_pretrained(<span style="color:#ce9178;">f"./checkpoint_{stage_name}"</span>)

    <span style="color:#569cd6;">return</span> model  <span style="color:#6a9955;"># Clean model, ready for next stage</span>

<span style="color:#6a9955;"># Pipeline:</span>
<span style="color:#6a9955;"># Base → train_stage(domain) → merge → train_stage(instr) → merge → train_stage(dpo)</span></div>

</div></div>`},
{id:'5.7',title:'Train with SFTTrainer (from TRL)',
fact:'SFTTrainer is built on top of HuggingFace Trainer. It handles the instruction formatting, response-only loss masking, and dataset preparation automatically.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">5.7</span> SFTTrainer — Purpose-Built for Instruction Tuning</h2>
<p>SFTTrainer from the TRL library handles instruction formatting and training in one shot.</p>

<div class="code-box">
<span style="color:#569cd6;">from</span> trl <span style="color:#569cd6;">import</span> SFTTrainer
<span style="color:#569cd6;">from</span> datasets <span style="color:#569cd6;">import</span> Dataset

<span style="color:#6a9955;"># Prepare instruction data as a Dataset</span>
dataset = Dataset.from_list(instruction_data)

trainer = SFTTrainer(
    model=model,
    train_dataset=dataset,
    tokenizer=tokenizer,
    max_seq_length=<span style="color:#ce9178;">512</span>,

    <span style="color:#6a9955;"># SFTTrainer automatically formats using the template below</span>
    formatting_func=format_instruction,  <span style="color:#6a9955;"># Our function from 5.3</span>

    args=TrainingArguments(
        output_dir=<span style="color:#ce9178;">"./instruction_tuned"</span>,
        num_train_epochs=<span style="color:#ce9178;">3</span>,
        per_device_train_batch_size=<span style="color:#ce9178;">4</span>,
        learning_rate=<span style="color:#ce9178;">2e-4</span>,
        fp16=<span style="color:#569cd6;">True</span>,
        logging_steps=<span style="color:#ce9178;">10</span>,
    )
)

trainer.train()
<span style="color:#6a9955;"># SFTTrainer internally: formats → tokenizes → adds labels → trains</span></div>

</div></div>`},
{id:'5.8',title:'Optional: Mask Labels Before Response',
fact:'Without masking, the model learns to predict ALL tokens including "### Instruction: What is Metformin?" — wasting capacity. Masking makes it focus ONLY on generating the response.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">5.8</span> Response-Only Training — Mask the Instruction Part</h2>
<p>By default, the model tries to predict EVERY token — including the instruction. We want it to learn ONLY the response.</p>

<div class="code-box">
<span style="color:#6a9955;"># Without masking: model learns to predict everything</span>
<span style="color:#ce9178;">"### Instruction: What is Metformin? ### Response: Metformin is..."</span>
<span style="color:#6a9955;">#                                              ↑ model learns from here too (waste)</span>

<span style="color:#6a9955;"># With masking: model ONLY learns the response part</span>
<span style="color:#ce9178;">"### Instruction: What is Metformin? ### Response: Metformin is..."</span>
<span style="color:#6a9955;">#                                               └────────── ONLY THIS ──────────┘</span>
<span style="color:#6a9955;">#                              labels = [-100,..., -100, token1, token2, ...]</span>
<span style="color:#6a9955;">#                              -100 = "ignore this position, don't compute loss"</span></div>

<div class="callout">
  <strong>🤔 Why mask?</strong> You don't want the model to get good at writing "### Instruction:" — you want it to get good at writing the ANSWER. Masking focuses 100% of the learning signal on the response tokens. SFTTrainer does this automatically when you use <code>formatting_func</code>.
</div>
</div></div>`},
{id:'5.9',title:'Compare: Base vs Domain vs Instruction-Tuned',
fact:'A base model given "What is Metformin?" might respond "What is Aspirin? What is Ibuprofen?" — completing the pattern, not answering. Instruction tuning teaches it that questions deserve answers.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">5.9</span> Compare the Three Stages</h2>
<p>Give the same prompt to all three versions. The difference shows what each stage learned.</p>

<table style="width:100%;border-collapse:collapse;font-size:0.9rem;margin:1rem 0;">

from datasets import Dataset
from transformers import AutoTokenizer

model_name = "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
tokenizer = AutoTokenizer.from_pretrained(model_name)
tokenizer.pad_token = tokenizer.eos_token

def format_instruction(example):
    if example["input"]:
        text = f"Below is an instruction and input. Write a response.\n\n### Instruction:\n{example['instruction']}\n\n### Input:\n{example['input']}\n\n### Response:\n{example['output']}"
    else:
        text = f"Below is an instruction. Write a response.\n\n### Instruction:\n{example['instruction']}\n\n### Response:\n{example['output']}"
    return {"text": text}

dataset = Dataset.from_list(instruction_data)
dataset = dataset.map(format_instruction)

def tokenize(ex):
    return tokenizer(ex["text"], truncation=True, padding="max_length", max_length=512)

dataset = dataset.map(tokenize, batched=True)
print(f"✅ Dataset ready: {len(dataset)} examples")</div>

model = AutoModelForCausalLM.from_pretrained(model_name, quantization_config=bnb_config, device_map="auto", torch_dtype=torch.float16)
model.config.use_cache = False

lora_config = LoraConfig(r=8, lora_alpha=16, lora_dropout=0.1, target_modules=["q_proj","v_proj"], bias="none", task_type="CAUSAL_LM")
model = get_peft_model(model, lora_config)
model.print_trainable_parameters()</div>
