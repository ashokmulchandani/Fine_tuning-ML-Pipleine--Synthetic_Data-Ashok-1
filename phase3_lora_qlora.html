<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 3: LoRA & QLoRA — Interactive Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafbfc;--card:#fff;--raised:#f0f2f5;--border:#dde0e5;--text:#1a1d23;--tdim:#4a4f5a;--tmut:#8b9099;--cyan:#007a99;--cyanbg:#e0f4fa;--amber:#b87000;--ambbg:#fff5e6;--green:#1a6e34;--greenbg:#e8f5ec;--magenta:#9e2a6b;--magentabg:#fdf0f7;--red:#c62828;--violet:#5b3aa8;--violetbg:#f3effc;--radius:14px;--rsm:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;min-height:100vh;}
.app{max-width:1000px;margin:0 auto;padding:1.5rem;}

.header{text-align:center;padding:2rem 0 1rem;}
.header .badge{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:0.7rem;letter-spacing:0.12em;color:var(--amber);border:1.5px solid var(--ambbg);background:var(--ambbg);border-radius:100px;padding:0.3em 1.2em;margin-bottom:0.75rem;font-weight:600;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:700;background:linear-gradient(135deg,var(--violet),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header p{color:var(--tdim);margin-top:0.3rem;font-size:0.95rem;}

/* Top bar */
.topbar{position:sticky;top:0;z-index:100;background:rgba(250,251,252,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0.5rem 1.5rem;display:flex;align-items:center;gap:0.8rem;font-size:0.75rem;}
.topbar .logo{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;letter-spacing:0.12em;color:var(--violet);white-space:nowrap;font-weight:600;}
.topbar .dots{display:flex;gap:0.3rem;flex:1;justify-content:center;}
.topbar .dot{width:22px;height:3px;border-radius:2px;background:var(--border);transition:0.3s;cursor:pointer;}
.topbar .dot.done{background:var(--green);}
.topbar .dot.active{background:var(--violet);box-shadow:0 0 6px rgba(91,58,168,0.3);}
.topbar .dot:hover{background:var(--tmut);}
.topbar .step-label{font-family:'Space Grotesk',monospace;font-size:0.6rem;color:var(--tmut);white-space:nowrap;}

/* Topic chips */
.chips{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin:1rem 0;}
.chip{font-family:'Space Grotesk',sans-serif;font-size:0.6rem;padding:0.4em 1em;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--tmut);cursor:pointer;transition:0.2s;}
.chip:hover{border-color:var(--tmut);color:var(--tdim);}
.chip.visited{border-color:var(--green);color:var(--green);background:var(--greenbg);}
.chip.current{border-color:var(--violet);color:var(--violet);background:var(--violetbg);box-shadow:0 0 8px rgba(91,58,168,0.1);}

/* Slides */
.slide{opacity:0;transform:translateY(20px);animation:fadeIn 0.45s ease forwards;}
@keyframes fadeIn{to{opacity:1;transform:translateY(0);}}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;margin-bottom:1rem;}
.card h2{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:600;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;}
.card h2 .num{font-size:0.7rem;color:var(--violet);background:var(--violetbg);border-radius:6px;padding:0.2em 0.6em;font-weight:700;}
.card p{color:var(--tdim);margin-bottom:0.7rem;font-size:0.93rem;}
.card ul{list-style:none;padding:0;}
.card ul li{padding:0.35rem 0;color:var(--tdim);display:flex;align-items:flex-start;gap:0.5rem;font-size:0.9rem;}
.card ul li::before{content:'▸';color:var(--violet);flex-shrink:0;}

/* Code box */
.code-box{background:var(--raised);border:1px solid var(--border);border-left:3px solid var(--violet);border-radius:var(--rsm);padding:1rem 1.25rem;margin:1rem 0;font-family:'Space Grotesk',monospace;font-size:0.82rem;line-height:1.9;white-space:pre-wrap;overflow-x:auto;}

/* Fun fact */
.fun-fact{background:linear-gradient(135deg,var(--violetbg),var(--magentabg));border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin:1rem 0;display:flex;align-items:flex-start;gap:0.7rem;font-size:0.88rem;}
.fun-fact .bulb{font-size:1.3rem;flex-shrink:0;}

/* Matrix vis */
.matrix-box{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;justify-content:center;margin:1rem 0;font-family:'Space Grotesk',monospace;font-size:0.7rem;}
.matrix{display:grid;gap:1px;background:var(--border);padding:1px;border-radius:4px;}
.matrix .cell{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-weight:600;border-radius:2px;}
.matrix .cell.frozen{background:#eef0f4;color:var(--tmut);}
.matrix .cell.train{background:var(--violetbg);color:var(--violet);}
.matrix .cell.highlight{background:var(--cyanbg);color:var(--cyan);}
.matrix-label{font-size:0.6rem;color:var(--tmut);text-align:center;}

/* Compare */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0;}
.cmp-card{background:var(--raised);border:1px solid var(--border);border-radius:var(--rsm);padding:1.25rem;}
.cmp-card.left{border-left:3px solid var(--red);}
.cmp-card.right{border-left:3px solid var(--green);}
.cmp-card h4{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;letter-spacing:0.06em;margin-bottom:0.5rem;}
.cmp-card.left h4{color:var(--red);}
.cmp-card.right h4{color:var(--green);}
.cmp-card p,.cmp-card li{font-size:0.82rem;color:var(--tdim);}

/* Quiz */
.quiz{margin:1rem 0;}
.quiz .q{font-weight:600;font-size:0.95rem;margin-bottom:0.6rem;}
.quiz .opt{background:var(--raised);border:2px solid var(--border);border-radius:var(--rsm);padding:0.8rem 1rem;cursor:pointer;transition:0.2s;font-size:0.88rem;margin-bottom:0.4rem;}
.quiz .opt:hover{border-color:var(--tmut);}
.quiz .opt.correct{border-color:var(--green)!important;background:var(--greenbg)!important;}
.quiz .opt.wrong{border-color:var(--red)!important;background:#fdecea!important;}

/* Nav */
.nav-row{display:flex;justify-content:space-between;margin:1.5rem 0 3rem;}
.nav-btn{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.06em;padding:0.65em 1.6em;border:1.5px solid var(--border);border-radius:100px;background:var(--bg);color:var(--text);cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:0.4em;}
.nav-btn:hover{border-color:var(--violet);color:var(--violet);}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
.nav-btn.primary{background:var(--violet);border-color:var(--violet);color:#fff;}
.nav-btn.primary:hover{opacity:0.88;color:#fff;}

@media(max-width:768px){.cmp{grid-template-columns:1fr;}.app{padding:0.75rem;}.matrix .cell{width:22px;height:22px;font-size:0.5rem;}}
</style>
</head>
<body>

<nav class="topbar">
  <span class="logo">Phase 3</span>
  <div class="dots" id="dots"></div>
  <span class="step-label" id="stepLabel">1/10</span>
</nav>

<div class="app">

<header class="header">
  <div class="badge">📖 IN PROGRESS</div>
  <h1>LoRA & QLoRA</h1>
  <p>The core technique that makes efficient fine-tuning possible. Track changes, not weights.</p>
</header>

<div class="chips" id="chips"></div>

<div class="fun-fact" id="funFact">
  <span class="bulb">💡</span>
  <span id="funFactText"></span>
</div>

<div id="slideContainer"></div>

<div class="nav-row">
  <button class="nav-btn" id="prevBtn" onclick="goTo(cur-1)">← Previous</button>
  <button class="nav-btn primary" id="nextBtn" onclick="goTo(cur+1)">Next →</button>
</div>

</div>

<script>
// ── DATA ──
const slides = [
{ // 3.1
  id:'3.1', title:'The Problem: Full Fine-Tuning Is Too Expensive',
  fact:'Fine-tuning GPT-3 (175B) in FP16 needs ~350GB VRAM just for the model weights. Add optimizer states (Adam: 2×) and gradients (1×) = ~1.4 TB GPU memory. That\'s 18× A100 80GB GPUs — for ONE fine-tuning run.',
  render(){return `
<div class="slide"><div class="card">
<h2><span class="num">3.1</span> Why Can't We Just Fine-Tune All 7 Billion Weights?</h2>
<p>Full fine-tuning means: every single parameter gets a gradient update. For a 7B model:</p>

<div class="code-box">
<span style="color:var(--tmut)">Memory needed for full fine-tuning (Llama-7B):</span>

  Model weights (FP16):     7B × 2 bytes = <span style="color:var(--red)">14 GB</span>
  Optimizer states (Adam):   7B × 8 bytes = <span style="color:var(--red)">56 GB</span>
  Gradients:                 7B × 2 bytes = <span style="color:var(--red)">14 GB</span>
  Activations (batch):       ~<span style="color:var(--red)">8 GB</span>
  ─────────────────────────────────────────
  <strong>Total: ~92 GB</strong> for a 7B model!

  For Llama-70B:  ~920 GB  (12× A100 80GB GPUs)
  For GPT-3 175B: ~2.3 TB  (29× A100 80GB GPUs)</div>

<p><strong>And that's just ONE fine-tuned model.</strong> If you want 10 different fine-tuned versions (chat, code, medical, legal...), you need to store 10 full copies = 140 GB.</p>

<div class="quiz" id="q1"><div class="q">🧪 What's the biggest memory hog in full fine-tuning?</div>
<div class="opt" data-correct="true" onclick="checkQuiz('q1',this)">A. Optimizer states (Adam: 4× model size)</div>
<div class="opt" onclick="checkQuiz('q1',this)">B. Model weights themselves</div>
<div class="opt" onclick="checkQuiz('q1',this)">C. The training dataset</div></div>
</div></div>`;}
},
{ // 3.2
  id:'3.2', title:'LoRA Concept: Track Changes, Not Weights',
  fact:'The name "LoRA" stands for Low-Rank Adaptation. "Low-Rank" refers to the matrix decomposition trick — we use a very small rank (r=8) instead of the full dimension (d=4096).',
  render(){return `
<div class="slide"><div class="card">
<h2><span class="num">3.2</span> The Core Idea: Freeze the Model, Train a "Patch"</h2>
<p>Instead of updating 7 billion weights, LoRA freezes the entire base model and trains a tiny <strong>"adapter"</strong> — a small matrix that tracks weight <em>changes</em>.</p>

<div class="code-box">
<span style="color:var(--tmut)">Full Fine-Tuning:</span>
  Every weight W gets updated:  W_new = W + ΔW
  Store: entire new model (14 GB per version)

<span style="color:var(--violet)">LoRA:</span>
  Freeze all W. Train small matrices B and A.
  W_new = W + <span style="color:var(--violet)">B × A</span>
  Store: only B and A (~10 MB per version!)</div>

<div class="cmp">
  <div class="cmp-card left"><h4>🔴 Full Fine-Tuning</h4>
    <p>Updates ALL weights. 1 model = 1 full copy. 10 versions = 140 GB.</p>
  </div>
  <div class="cmp-card right"><h4>🟢 LoRA</h4>
    <p>Freezes base model. Trains only B×A adapter. 1 base + 10 adapters = 14 GB + 100 MB.</p>
  </div>
</div>

<p><strong>The analogy:</strong> Instead of rewriting an entire book for a new edition, you publish a tiny "errata" slip (the adapter). The original book (base model) stays the same. The slip tells you what changed.</p>

<div class="quiz" id="q2"><div class="q">🧪 In LoRA, what happens to the original model weights during training?</div>
<div class="opt" data-correct="true" onclick="checkQuiz('q2',this)">A. They stay FROZEN — never updated</div>
<div class="opt" onclick="checkQuiz('q2',this)">B. They get small gradient updates</div></div>
</div></div>`;}
},
{ // 3.3
  id:'3.3', title:'Matrix Decomposition: d×d → d×r + r×d',
  fact:'For a typical attention layer (d=4096), a full weight matrix has 4096×4096 = 16.8 million parameters. With LoRA rank r=8: B is 4096×8 and A is 8×4096 = 65,536 params total. That\'s 0.4% of the original.',
  render(){return `
<div class="slide"><div class="card">
<h2><span class="num">3.3</span> Matrix Decomposition — Making Big Things Small</h2>
<p>A weight matrix W is <strong>d × d</strong> (e.g., 4096 × 4096). Instead of learning ΔW directly (16.8M params), LoRA decomposes it:</p>

<div class="code-box">
<span style="color:var(--tmut)">The Decomposition:</span>

  ΔW  =  <span style="color:var(--violet)">B</span>  ×  <span style="color:var(--magenta)">A</span>
  (d×d)   (d×r)    (r×d)

  r = rank (typically 8),  r << d

  Example (d=4096, r=8):
    Full ΔW:  4096 × 4096 = <span style="color:var(--red)">16,777,216</span> params
    B:         4096 × 8    =    32,768 params
    A:         8 × 4096    =    32,768 params
    B + A total:              <span style="color:var(--green)">65,536</span> params  (0.4%!)</div>

<div style="display:flex;align-items:center;gap:1rem;justify-content:center;flex-wrap:wrap;margin:1rem 0;font-family:'Space Grotesk',sans-serif;">
  <div style="text-align:center">
    <div style="font-size:0.6rem;color:var(--tmut);">ΔW (d×d)</div>
    <div class="matrix" style="grid-template-columns:repeat(6,1fr);">${Array(36).fill('<div class="cell frozen">●</div>').join('')}</div>
    <div style="font-size:0.55rem;color:var(--red);margin-top:3px;">16.8M params</div>
  </div>
  <div style="font-size:1.5rem;">=</div>
  <div style="text-align:center">
    <div style="font-size:0.6rem;color:var(--tmut);">B (d×r)</div>
    <div class="matrix" style="grid-template-columns:repeat(2,1fr);">${Array(12).fill('<div class="cell train">●</div>').join('')}</div>
    <div style="font-size:0.55rem;color:var(--green);margin-top:3px;">32K</div>
  </div>
  <div style="font-size:1.5rem;">×</div>
  <div style="text-align:center">
    <div style="font-size:0.6rem;color:var(--tmut);">A (r×d)</div>
    <div class="matrix" style="grid-template-columns:repeat(6,1fr);">${Array(12).fill('<div class="cell train">●</div>').join('')}</div>
    <div style="font-size:0.55rem;color:var(--green);margin-top:3px;">32K</div>
  </div>
</div>

<p><strong>Think of it like this:</strong> Instead of memorizing 16.8 million individual changes, you learn a "compressed" version using only 65K numbers. B captures <em>what</em> changes. A captures <em>where</em> the changes go.</p>
</div></div>`;}
},
{ // 3.4
  id:'3.4', title:'Rank Selection: r = 1, 2, 4, 8, 16, 64',
  fact:'Most papers use r=8 or r=16. Going from r=8 to r=64 doubles the adapter size but typically gives less than 1% improvement. The sweet spot is almost always r=8.',
  render(){return `
<div class="slide"><div class="card">
<h2><span class="num">3.4</span> Rank (r) — How Much "Capacity" Does the Adapter Have?</h2>
<p>Rank controls how many independent "directions" the adapter can change the weights in. Higher rank = more expressiveness, but more parameters.</p>

<div class="code-box">
<span style="color:var(--tmut)">Adapter params = d × r + r × d = 2 × d × r</span>

  r=1:   2 × 4096 × 1  =    8,192 params  (0.05% of full)
  r=2:   2 × 4096 × 2  =   16,384 params  (0.10%)
  r=4:   2 × 4096 × 4  =   32,768 params  (0.20%)
  <span style="color:var(--violet)">r=8:   2 × 4096 × 8  =   65,536 params  (0.39%) ← sweet spot</span>
  r=16:  2 × 4096 × 16 =  131,072 params  (0.78%)
  r=64:  2 × 4096 × 64 =  524,288 params  (3.12%)

<span style="color:var(--tmut)">When to use higher rank (r=32-64):</span>
  • Complex domain shift (e.g., English → Code)
  • Large, diverse training dataset
  • You notice underfitting with r=8

<span style="color:var(--tmut)">When to use lower rank (r=1-4):</span>
  • Simple style adaptation (e.g., formal → casual tone)
  • Very small dataset (< 1000 examples)
  • You want the smallest possible adapter</div>

<div class="quiz" id="q4"><div class="q">🧪 You're fine-tuning a model to write in Shakespeare's style. Which rank?</div>
<div class="opt" data-correct="true" onclick="checkQuiz('q4',this)">A. r=4 — style adaptation is simple, small rank is fine</div>
<div class="opt" onclick="checkQuiz('q4',this)">B. r=64 — Shakespeare is complex, need maximum capacity</div></div>
</div></div>`;}
},
{ // 3.5
  id:'3.5', title:'LoRA Equation: W_new = W_0 + B×A',
  fact:'At inference time, you can merge B×A into W_0: just compute W_new = W_0 + B×A once, then use W_new exactly like the original model. Zero inference latency overhead — this is why LoRA won over other PEFT methods.',
  render(){return `
<div class="slide"><div class="card">
<h2><span class="num">3.5</span> The LoRA Equation — Everything in One Line</h2>

<div class="code-box" style="font-size:1rem;text-align:center;padding:1.5rem;">
<span style="font-size:1.3rem;font-weight:700;color:var(--violet);">W_new = W₀ + B × A</span>
</div>

<p>Where:</p>
<div class="code-box">
<span style="color:var(--violet);">W₀</span> = Frozen pre-trained weights (d × d) — <strong>never changes</strong>
<span style="color:var(--magenta);">B</span>  = Trainable matrix (d × r) — learns WHAT changes
<span style="color:var(--cyan);">A</span>  = Trainable matrix (r × d) — learns WHERE changes go
<span style="color:var(--green);">B×A</span> = The "delta patch" (d × d) — added to original weights</div>

<p style="margin-top:1rem;"><strong>The forward pass becomes:</strong></p>
<div class="code-box">
<span style="color:var(--tmut)">Original:</span>  h = W₀ × x                    (frozen)

<span style="color:var(--violet)">LoRA:</span>     h = W₀ × x  +  <span style="color:var(--violet)">B × A × x</span>
              ↑              ↑
         frozen path     trainable "side path"

<span style="color:var(--tmut)">At inference:</span>
  Merge once: W = W₀ + B×A
  Then use:   h = W × x    (same speed as original!)</div>

<div class="quiz" id="q5"><div class="q">🧪 Why does LoRA add ZERO inference latency?</div>
<div class="opt" data-correct="true" onclick="checkQuiz('q5',this)">A. B×A is merged into W₀ before deployment — same matrix size, same speed</div>
<div class="opt" onclick="checkQuiz('q5',this)">B. B and A are so small they compute instantly</div></div>
</div></div>`;}
},
{ // 3.6
  id:'3.6', title:'Parameter Savings — 175B → 37.7M (0.02%)',
  fact:'A full GPT-3 fine-tune stores ~350 GB. A LoRA adapter for GPT-3 with r=8 is ~75 MB — small enough to email. You can have 4,500 LoRA adapters for the storage cost of ONE full fine-tune.',
  render(){return `
<div class="slide"><div class="card">
<h2><span class="num">3.6</span> The Numbers That Changed Everything</h2>

<div class="code-box">
<span style="color:var(--tmut)">Parameter count comparison:</span>

  Model      Full FT Params    LoRA Params (r=8)    Savings
  ─────      ──────────────    ─────────────────    ───────
  Llama-7B      7,000,000,000        37,748,736      99.46%
  Llama-13B    13,000,000,000        37,748,736      99.71%
  Llama-70B    70,000,000,000        37,748,736      99.95%
  GPT-3 175B  175,000,000,000        37,748,736      99.98%

<span style="color:var(--tmut)">Storage comparison (per fine-tuned version):</span>

  Full FT:  140 GB (7B)  /  350 GB (175B)
  LoRA:      ~10 MB (r=8, saved as safetensors)
  Ratio:     <span style="color:var(--green);">14,000× smaller!</span></div>

<p><strong>This is why LoRA won.</strong> Before LoRA (2021), fine-tuning a 175B model required a supercomputer. After LoRA, you can do it on a single consumer GPU. The entire LLM fine-tuning ecosystem — including QLoRA (next slide) — is built on this insight.</p>
</div></div>`;}
},
{ // 3.7
  id:'3.7', title:'QLoRA — Quantize THEN Apply LoRA',
  fact:'QLoRA lets you fine-tune a 65B model on a single 48GB GPU. Without QLoRA, you\'d need ~260 GB. The trick: quantize the base model to 4-bit FIRST, then apply LoRA on top. The LoRA adapter works in FP16, compensating for 4-bit precision loss.',
  render(){return `
<div class="slide"><div class="card">
<h2><span class="num">3.7</span> QLoRA — Where Phase 2 Meets Phase 3</h2>
<p><strong>This is the payoff for learning quantization.</strong> QLoRA = <span style="color:var(--amber);">Quantize</span> + <span style="color:var(--violet);">LoRA</span>. It combines both techniques we've been studying.</p>

<div class="code-box">
<span style="color:var(--tmut)">QLoRA Recipe:</span>

  Step 1: <span style="color:var(--amber);">Quantize base model to 4-bit</span> (BitsAndBytes NF4)
          7B model: 14 GB → 3.5 GB (frozen, never trained)

  Step 2: <span style="color:var(--violet);">Apply LoRA adapters in FP16</span>
          Only ~37M trainable params (the adapters)

  Step 3: <span style="color:var(--green);">Fine-tune on a single GPU!</span>
          Dequantize weights on-the-fly for forward pass
          Compute gradients only for LoRA adapters</div>

<div class="cmp">
  <div class="cmp-card left"><h4>🔴 Without QLoRA</h4>
    <p>65B model in FP16 = 130 GB. Need 4× A100 GPUs. Only large companies can afford this.</p>
  </div>
  <div class="cmp-card right"><h4>🟢 With QLoRA</h4>
    <p>65B model in 4-bit = ~16 GB. LoRA = ~40 MB. Fits on ONE RTX 4090. Anyone can fine-tune.</p>
  </div>
</div>

<p><strong>How it works under the hood:</strong> During each forward pass, 4-bit weights are briefly dequantized to FP16, used for computation, then discarded. The LoRA adapter learns to <strong>compensate</strong> for the 4-bit quantization error — similar to how QAT works!</p>

<div class="quiz" id="q7"><div class="q">🧪 What gets TRAINED in QLoRA?</div>
<div class="opt" onclick="checkQuiz('q7',this)">A. The 4-bit quantized weights</div>
<div class="opt" data-correct="true" onclick="checkQuiz('q7',this)">B. Only the FP16 LoRA adapters (B and A)</div>
<div class="opt" onclick="checkQuiz('q7',this)">C. Both the quantized weights and adapters</div></div>
</div></div>`;}
},
{ // 3.8
  id:'3.8', title:'LoRA Config: r, alpha, dropout, target_modules',
  fact:'The typical target_modules for Llama models are ["q_proj", "v_proj"]. Some practitioners also add "k_proj" and "o_proj" for better performance, at the cost of ~2× adapter size.',
  render(){return `
<div class="slide"><div class="card">
<h2><span class="num">3.8</span> LoRA Configuration — What Each Parameter Does</h2>

<div class="code-box">
<span style="color:var(--tmut)">from peft import LoraConfig</span>

lora_config = LoraConfig(
    <span style="color:var(--violet);">r=8</span>,                    <span style="color:var(--tmut)"># Rank — capacity of adapter</span>
    <span style="color:var(--violet);">lora_alpha=16</span>,           <span style="color:var(--tmut)"># Scaling factor for B×A output</span>
    <span style="color:var(--violet);">lora_dropout=0.1</span>,        <span style="color:var(--tmut)"># Dropout on adapter (regularization)</span>
    <span style="color:var(--violet);">target_modules=</span>          <span style="color:var(--tmut)"># Which layers get LoRA adapters</span>
      ["q_proj", "v_proj"],
    <span style="color:var(--violet);">task_type="CAUSAL_LM"</span>    <span style="color:var(--tmut)"># Causal language modeling</span>
)</div>

<div class="code-box" style="margin-top:1rem;">
<span style="color:var(--tmut)">What each parameter means:</span>

  <span style="color:var(--violet);">r (rank):</span>        Higher = more capacity, bigger adapter
                      r=8 is the standard starting point

  <span style="color:var(--violet);">lora_alpha:</span>      Scales the adapter output: output = (alpha/r) × B×A × x
                      alpha=16 with r=8 → scaling factor = 2
                      Higher alpha = adapter has more influence

  <span style="color:var(--violet);">lora_dropout:</span>    Randomly drops adapter connections during training
                      Prevents the adapter from overfitting
                      0.05-0.1 is typical

  <span style="color:var(--violet);">target_modules:</span>  Which weight matrices get adapters
                      "q_proj", "v_proj" = standard (smallest)

{ // 3.9
  id:'3.9', title:'When to Use High vs Low Rank',
  fact:'Research shows r=1 already captures 90%+ of the benefit for simple tasks. Going from r=8 to r=64 often gives diminishing returns — the adapter saturates because the base model is already very capable.',
  render(){return `
<div class="slide"><div class="card">
<h2><span class="num">3.9</span> Rank Selection Guide</h2>

<div class="code-box">
<span style="color:var(--tmut)">Task complexity → Recommended rank:</span>

  <span style="color:var(--green);">r = 1–2</span>   Style transfer (formal→casual, tone adjustment)
              Very small dataset (< 500 examples)
              "I just want the model to sound different"

  <span style="color:var(--violet);">r = 4–8</span>   Instruction following (standard SFT)
              Domain adaptation (medical, legal, finance)
              1K–10K training examples
              <span style="color:var(--tmut);">← This covers 80% of use cases</span>

  <span style="color:var(--amber);">r = 16–32</span> Complex reasoning (math, code generation)
              Large domain shift (English → Programming language)
              10K–100K training examples

  <span style="color:var(--red);">r = 64+</span>   Near-full-model-capacity adaptation
              Very large datasets (100K+ examples)
              When every % of accuracy matters
              <span style="color:var(--tmut);">← Rarely needed in practice</span></div>

<p><strong>How to choose:</strong> Start with r=8. If the model underfits (training loss doesn't go down enough), try r=16. If it overfits (validation loss goes up while training loss drops), try r=4. Simple.</p>
</div></div>`;}
},
{ // 3.10
  id:'3.10', title:'Adapter Merging — Merge, Never Stack!',
  fact:'If you stack adapters without merging (train Phase 4 adapter on top of Phase 5 adapter on top of Phase 6 adapter), each adapter learns to compensate for the PREVIOUS adapter\'s errors, not the base model. The result: catastrophic drift.',
  render(){return `
<div class="slide"><div class="card">
<h2><span class="num">3.10</span> The Golden Rule: Merge Before the Next Stage</h2>
<p>When doing multi-stage fine-tuning (Domain → Instruction → Preference), you must <strong>merge</strong> each LoRA adapter into the base weights before starting the next stage.</p>

<div class="code-box">
<span style="color:var(--red);">❌ WRONG — Stacking adapters:</span>
  Base Model → LoRA₁ (domain) → LoRA₂ (instruction) → LoRA₃ (DPO)
  Each adapter tries to fix the PREVIOUS adapter. Chaos.

<span style="color:var(--green);">✅ CORRECT — Merging between stages:</span>
  Base Model → LoRA₁ → <span style="color:var(--green);">merge!</span> → LoRA₂ → <span style="color:var(--green);">merge!</span> → LoRA₃
  Each adapter learns from the merged model. Clean.</div>

<div class="code-box" style="margin-top:1rem;">
<span style="color:var(--tmut)">In code:</span>

  <span style="color:var(--tmut)"># After Phase 4 (domain adaptation):</span>
  model = PeftModel.from_pretrained(base_model, "phase4_adapter")
  model = model.<span style="color:var(--violet);">merge_and_unload()</span>     <span style="color:var(--tmut)"># Merge LoRA INTO base weights</span>

  <span style="color:var(--tmut)"># Now apply Phase 5 (instruction tuning) on the MERGED model:</span>
  model = get_peft_model(model, lora_config_phase5)
  model.train()                          <span style="color:var(--tmut)"># Fresh LoRA on merged weights</span>

  <span style="color:var(--tmut)"># Merge again, then Phase 6 (DPO):</span>
  model = model.<span style="color:var(--violet);">merge_and_unload()</span>
  model = get_peft_model(model, lora_config_phase6)</div>

<p><strong>Think of it like painting:</strong> You apply one coat, let it dry (merge), then apply the next coat. You don't stack wet paint on wet paint.</p>
</div></div>`;}
}
];

// ── STATE ──
let cur=0;
const visited=new Set([0]);

function render(i){
  cur=i; visited.add(i);
  document.getElementById('slideContainer').innerHTML=slides[i].render();
  document.getElementById('stepLabel').textContent=`${i+1}/${slides.length}`;
  document.getElementById('funFactText').innerHTML=`<strong>${slides[i].id}:</strong> ${slides[i].fact}`;

  // Dots
  document.getElementById('dots').innerHTML=slides.map((_,j)=>{
    let cls=j===cur?'active':visited.has(j)?'done':'';
    return `<div class="dot ${cls}" onclick="goTo(${j})" title="${slides[j].id}: ${slides[j].title}"></div>`;
  }).join('');

  // Chips
  document.getElementById('chips').innerHTML=slides.map((s,j)=>{
    let cls=j===cur?'current':visited.has(j)?'visited':'';
    return `<span class="chip ${cls}" onclick="goTo(${j})">${s.id}</span>`;
  }).join('');

  document.getElementById('prevBtn').disabled=i===0;
  const nb=document.getElementById('nextBtn');
  if(i===slides.length-1){nb.textContent='✓ Complete';nb.style.background='var(--green)';nb.style.borderColor='var(--green)';}
  else{nb.textContent='Next →';nb.style.background='var(--violet)';nb.style.borderColor='var(--violet)';nb.style.color='#fff';}

  document.getElementById('slideContainer').scrollIntoView({behavior:'smooth',block:'start'});
}

function goTo(i){if(i<0||i>=slides.length)return;render(i);}

// Quiz
window.checkQuiz=function(qid,el){
  const q=document.getElementById(qid);if(q.dataset.done)return;
  q.querySelectorAll('.opt').forEach(o=>{if(o.dataset.correct==='true')o.classList.add('correct');});
  if(el.dataset.correct!=='true')el.classList.add('wrong');
  q.dataset.done='true';
};

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&cur<slides.length-1)goTo(cur+1);
  if(e.key==='ArrowLeft'&&cur>0)goTo(cur-1);
});

render(0);
</script>
</body>
