<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 4: Non-Instructional Fine-Tuning</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafbfc;--card:#fff;--raised:#f0f2f5;--border:#dde0e5;--text:#1a1d23;--tdim:#4a4f5a;--tmut:#8b9099;--violet:#5b3aa8;--vbg:#f3effc;--green:#1a6e34;--red:#c62828;--amber:#b87000;--cyan:#007a99;--magenta:#9e2a6b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;min-height:100vh;}
.app{max-width:1000px;margin:0 auto;padding:1.5rem;}

.header{text-align:center;padding:2rem 0 1rem;}
.header .badge{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:0.7rem;letter-spacing:0.12em;color:var(--green);border:1.5px solid var(--green);background:rgba(26,110,52,0.08);border-radius:100px;padding:0.3em 1.2em;margin-bottom:0.75rem;font-weight:600;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.4rem,4vw,1.9rem);font-weight:700;color:var(--violet);}
.header p{color:var(--tdim);font-size:0.95rem;margin-top:0.3rem;}

.topbar{position:sticky;top:0;z-index:100;background:rgba(250,251,252,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0.5rem 1.5rem;display:flex;align-items:center;gap:0.8rem;font-size:0.75rem;}
.topbar .logo{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;letter-spacing:0.12em;color:var(--violet);white-space:nowrap;font-weight:600;}
.topbar .dots{display:flex;gap:0.3rem;flex:1;justify-content:center;}
.topbar .dot{width:22px;height:3px;border-radius:2px;background:var(--border);transition:0.3s;cursor:pointer;}
.topbar .dot.done{background:var(--green);}
.topbar .dot.active{background:var(--violet);box-shadow:0 0 6px rgba(91,58,168,0.3);}
.topbar .dot:hover{background:var(--tmut);}
.topbar .step-label{font-family:'Space Grotesk',monospace;font-size:0.6rem;color:var(--tmut);white-space:nowrap;}

.chips{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin:1rem 0;}
.chip{font-family:'Space Grotesk',sans-serif;font-size:0.6rem;padding:0.4em 1em;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--tmut);cursor:pointer;transition:0.2s;}
.chip:hover{border-color:var(--tmut);color:var(--tdim);}
.chip.visited{border-color:var(--green);color:var(--green);background:rgba(26,110,52,0.06);}
.chip.current{border-color:var(--violet);color:var(--violet);background:var(--vbg);box-shadow:0 0 8px rgba(91,58,168,0.1);}

.slide{opacity:0;transform:translateY(20px);animation:fadeIn 0.45s ease forwards;}
@keyframes fadeIn{to{opacity:1;transform:translateY(0);}}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.75rem;margin-bottom:1rem;}
.card h2{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:600;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;}
.card h2 .num{font-size:0.7rem;color:var(--violet);background:var(--vbg);border-radius:6px;padding:0.2em 0.6em;font-weight:700;}
.card p{color:var(--tdim);margin-bottom:0.7rem;font-size:0.93rem;}

.code-box{background:#1e1e1e;border:1px solid #333;border-left:3px solid var(--violet);border-radius:8px;padding:1rem 1.25rem;margin:1rem 0;font-family:'Cascadia Code','Fira Code','JetBrains Mono','Space Grotesk',monospace;font-size:0.8rem;line-height:1.8;white-space:pre-wrap;overflow-x:auto;color:#d4d4d4;}
.code-box .cell-num{color:#fff!important;font-family:'Space Grotesk',sans-serif!important;}
.cell-num{font-family:'Space Grotesk',sans-serif!important;font-size:0.6rem!important;font-weight:700!important;color:#fff!important;background:var(--violet)!important;display:inline-block!important;padding:0.2em 0.7em!important;border-radius:4px 4px 0 0!important;margin-bottom:-1px!important;letter-spacing:0.06em!important;}

.fun-fact{background:linear-gradient(135deg,rgba(91,58,168,0.04),rgba(0,122,153,0.04));border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;margin:1rem 0;display:flex;align-items:flex-start;gap:0.7rem;font-size:0.88rem;}

.pipeline{display:flex;align-items:center;gap:0.3rem;flex-wrap:wrap;justify-content:center;margin:1rem 0;font-family:'Space Grotesk',sans-serif;font-size:0.6rem;}
.pipe-step{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:0.5rem 0.8rem;text-align:center;}
.pipe-step.active{border-color:var(--violet);background:var(--vbg);}
.pipe-arrow{font-size:1rem;color:var(--tmut);}

.nav-row{display:flex;justify-content:space-between;margin:1.5rem 0 3rem;}
.nav-btn{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.06em;padding:0.65em 1.6em;border:1.5px solid var(--border);border-radius:100px;background:var(--bg);color:var(--text);cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:0.4em;}
.nav-btn:hover{border-color:var(--violet);color:var(--violet);}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
.nav-btn.primary{background:var(--violet);border-color:var(--violet);color:#fff;}
.nav-btn.primary:hover{opacity:0.88;color:#fff;}

.callout{background:var(--vbg);border:1px solid rgba(91,58,168,0.15);border-radius:10px;padding:1rem 1.25rem;margin:1rem 0;font-size:0.85rem;line-height:1.7;}

/* Copy button */
.code-wrapper{position:relative;}
.copy-btn{position:absolute;top:8px;right:8px;font-family:'Space Grotesk',sans-serif;font-size:0.6rem;font-weight:600;padding:0.35em 0.8em;border:1px solid #555;border-radius:6px;background:#2d2d2d;color:#ccc;cursor:pointer;transition:0.15s;opacity:0;}
.code-wrapper:hover .copy-btn,.copy-btn.copied{opacity:1;}
.copy-btn:hover{border-color:#c586c0;color:#c586c0;background:#333;}
.copy-btn.copied{border-color:#4ec9b0;color:#4ec9b0;background:#2d2d2d;}

@media(max-width:768px){.app{padding:0.75rem;}.copy-btn{opacity:1;}}
</style>

<script>
const slides=[
{id:'Setup',title:'Getting Started — Colab, GPU, PDFs',
fact:'Google Colab gives you a FREE T4 GPU (16 GB) for up to 12 hours. More than enough for Phase 4—6 fine-tuning.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">Setup</span> Where to Run & Where to Get PDFs</h2>

<h3 style="font-family:'Space Grotesk',sans-serif;font-size:0.8rem;color:var(--violet);margin:1rem 0 0.5rem;">🖥️ Do I Need Colab?</h3>
<p><strong>Yes — highly recommended.</strong> Colab gives you a free GPU. Your laptop CPU would take 10–50× longer. Go to <a href="https://colab.research.google.com" target="_blank" style="color:#c586c0;">colab.research.google.com</a> → New Notebook.</p>

<div class="code-box"><span style="color:#6a9955;"># FIRST CELL — Enable GPU (Runtime → Change runtime type → T4 GPU)</span>
<span style="color:#6a9955;"># Then verify:</span>
!nvidia-smi
<span style="color:#6a9955;"># Should show: "Tesla T4" with 15GB available</span>

<span style="color:#6a9955;"># SECOND CELL — Install everything (takes ~2 minutes)</span>
!pip install -q transformers datasets peft bitsandbytes accelerate trl PyMuPDF torch</div>

<h3 style="font-family:'Space Grotesk',sans-serif;font-size:0.8rem;color:var(--violet);margin:1.5rem 0 0.5rem;">📄 Where to Find PDF Files?</h3>

<table style="width:100%;font-size:0.8rem;border-collapse:collapse;margin:0.5rem 0;">
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem 0;font-weight:600;">Option</td><td style="padding:0.4rem 0;font-weight:600;">Source</td><td style="padding:0.4rem 0;font-weight:600;">Good For</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem 0;">1. ArXiv papers</td><td style="padding:0.4rem 0;">arxiv.org → Download PDF</td><td style="padding:0.4rem 0;">AI/ML domain, science</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem 0;">2. PubMed</td><td style="padding:0.4rem 0;">pubmed.ncbi.nlm.nih.gov</td><td style="padding:0.4rem 0;">Medical domain</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem 0;">3. Your own docs</td><td style="padding:0.4rem 0;">Any PDFs on your computer</td><td style="padding:0.4rem 0;">Custom domain</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.4rem 0;">4. Free eBooks</td><td style="padding:0.4rem 0;">gutenberg.org, openstax.org</td><td style="padding:0.4rem 0;">General text</td></tr>
<tr><td style="padding:0.4rem 0;">5. Upload to Colab</td><td style="padding:0.4rem 0;">Left sidebar → Files → Upload</td><td style="padding:0.4rem 0;">Any PDF on your machine</td></tr>
</table>

<div class="callout" style="margin-top:1rem;">
  <strong>📋 How many PDFs do you need?</strong> Even <strong>2–3 research papers</strong> (~30–50 pages total) is enough to see the model learn domain language. For production: 50–200+ PDFs. For learning/testing: start with 2–3. You can always add more and retrain.
</div>

<h3 style="font-family:'Space Grotesk',sans-serif;font-size:0.8rem;color:var(--violet);margin:1.5rem 0 0.5rem;">📄 Get the PDF — One Line, No Upload Needed</h3>
<p>Your <strong>Complete-LLM-Finetuning</strong> GitHub repo has a perfect medical PDF. Download it directly in Colab:</p>
<div class="code-box"><span style="color:#6a9955;"># Downloads Metformin.pdf directly — no manual upload needed!</span>
!wget <span style="color:#ce9178;">"https://raw.githubusercontent.com/ashokmulchandani/Complete-LLM-Finetuning/main/LLM%20Fine-Tuning-14-Train-LLMs-on-Your-PDF-Text-Data%20-Domain-Specific-Fine-Tuning-with-HuggingFace/Metformin.pdf"</span>

<span style="color:#6a9955;"># Result: Metformin.pdf is now in your Colab files (medical/pharma PDF, ~300 KB)</span></div>

<h3 style="font-family:'Space Grotesk',sans-serif;font-size:0.8rem;color:var(--violet);margin:1.5rem 0 0.5rem;">⚡ Quick Start — 3 Steps</h3>
<div style="font-size:0.85rem;color:var(--tdim);line-height:2;">
  <strong>1.</strong> Open <a href="https://colab.research.google.com" target="_blank" style="color:#c586c0;">Colab</a> → New Notebook → Runtime → Change runtime type → <strong>T4 GPU</strong> → Save<br>
  <strong>2.</strong> Copy the install + wget commands above (📋 Copy) → Paste into <strong>Cell 1</strong> → Run (takes ~2 min)<br>
  <strong>3.</strong> Copy each code block from slides below — they're numbered <strong>Code 2, Code 3, ... Code N</strong> → Paste each into its own Colab cell → Run<br><br>
  <strong>Done!</strong> ~10 Colab cells total. No upload. No manual steps. Just copy, paste, run in order.
</div>
</div></div>`},
{id:'4.1',title:'Load PDF & Extract Text',
fact:'PyMuPDF (fitz) can extract text from a 100-page PDF in under 1 second. It\'s ~20× faster than PyPDF2 for large documents.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">4.1</span> Load PDF Data with PyMuPDF</h2>
<p>First step: get your domain text out of PDFs. PyMuPDF handles complex layouts — multi-column, tables, headers, footers.</p>

<div class="code-box"><span style="color:#6a9955;"># Install</span>
!pip install PyMuPDF datasets transformers peft bitsandbytes accelerate trl

<span style="color:#6a9955;"># Load PDF</span>
import fitz  <span style="color:#6a9955;"># PyMuPDF</span>

doc = fitz.open(<span style="color:#ce9178;">"Metformin.pdf"</span>)  <span style="color:#6a9955;"># From your Complete-LLM-Finetuning repo</span>
full_text = <span style="color:#ce9178;">""</span>

<span style="color:#569cd6;">for</span> page <span style="color:#569cd6;">in</span> doc:
    full_text += page.get_text()

print(<span style="color:#ce9178;">f"Extracted {len(full_text):,} chars from {len(doc)} pages"</span>)
<span style="color:#6a9955;"># → "Extracted 1,247,583 characters from 342 pages"</span></div>

<p><strong>What just happened?</strong> We turned the PDF into one big string of text. This text will teach the model your domain language (medical, legal, finance, whatever your PDFs contain).</p>
</div></div>`},
{id:'4.2',title:'Chunk Text — Respect Context Window',
fact:'Most LLMs have a 2048–4096 token context window. You can\'t feed a 100-page document at once. Chunking breaks it into bite-sized pieces that fit in the model\'s context.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">4.2</span> Chunk the Text</h2>
<p>Models have a <strong>context window limit</strong> (e.g., 2048 tokens). Even a short PDF has thousands of tokens. We split it into chunks of ~512 tokens each.</p>

<div class="code-box"><span style="color:#6a9955;"># Simple paragraph-based chunking</span>
<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">chunk_text</span>(text, max_chars=2000):
    paragraphs = text.split(<span style="color:#ce9178;">"\n\n"</span>)  <span style="color:#6a9955;"># Split by double newline</span>
    chunks = []
    current_chunk = <span style="color:#ce9178;">""</span>

    <span style="color:#569cd6;">for</span> para <span style="color:#569cd6;">in</span> paragraphs:
        <span style="color:#569cd6;">if</span> len(current_chunk) + len(para) &lt; max_chars:
            current_chunk += para + <span style="color:#ce9178;">"\n\n"</span>
        <span style="color:#569cd6;">else</span>:
            chunks.append(current_chunk.strip())
            current_chunk = para + <span style="color:#ce9178;">"\n\n"</span>

    <span style="color:#569cd6;">if</span> current_chunk:
        chunks.append(current_chunk.strip())
    <span style="color:#569cd6;">return</span> chunks

chunks = chunk_text(full_text, max_chars=2000)
print(<span style="color:#ce9178;">f"Created {len(chunks)} chunks"</span>)
<span style="color:#6a9955;"># → "Created 623 chunks"</span></div>

<p><strong>max_chars=2000 ≈ 512 tokens</strong>. Each chunk is one "training example." The model will learn to predict the next token within each chunk — absorbing the vocabulary, style, and knowledge of your domain.</p>
</div></div>`},
{id:'4.3',title:'Create HuggingFace Dataset',
fact:'HuggingFace Datasets lets you stream data from disk without loading everything into RAM. For a 1GB text corpus, this is the difference between crashing and running smoothly.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">4.3</span> Create HuggingFace Dataset Format</h2>
<p>We convert our chunks into the format the Trainer expects: a dictionary with a <strong>"text"</strong> key.</p>

<div class="code-box"><span style="color:#569cd6;">from</span> datasets <span style="color:#569cd6;">import</span> Dataset

<span style="color:#6a9955;"># Each chunk becomes {"text": "..."}</span>
data = [{<span style="color:#ce9178;">"text"</span>: chunk} <span style="color:#569cd6;">for</span> chunk <span style="color:#569cd6;">in</span> chunks]
dataset = Dataset.from_list(data)

<span style="color:#6a9955;"># Split 90/10 for train/validation</span>
dataset = dataset.train_test_split(test_size=0.1, seed=42)
train_data = dataset[<span style="color:#ce9178;">"train"</span>]
eval_data = dataset[<span style="color:#ce9178;">"test"</span>]

print(<span style="color:#ce9178;">f"Train: {len(train_data)} chunks, Eval: {len(eval_data)} chunks"</span>)
<span style="color:#6a9955;"># → Train: 560 chunks, Eval: 63 chunks</span></div>

<p>That's it. 623 chunks of domain text, split into train/eval, ready for tokenization.</p>
</div></div>`},
{id:'4.4',title:'Tokenize — Turn Text Into Numbers',
fact:'A 512-token chunk becomes 512 integers. Each integer maps to a word/subword in the model\'s vocabulary of 32,000 tokens.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">4.4</span> Tokenize with AutoTokenizer</h2>
<p>The model can't read text. It reads integers. Tokenization converts "The patient presented with..." into something like [464, 8522, 4521, 319, ...].</p>

<div class="code-box"><span style="color:#569cd6;">from</span> transformers <span style="color:#569cd6;">import</span> AutoTokenizer

model_name = <span style="color:#ce9178;">"TinyLlama/TinyLlama-1.1B-Chat-v1.0"</span>
tokenizer = AutoTokenizer.from_pretrained(model_name)
tokenizer.pad_token = tokenizer.eos_token  <span style="color:#6a9955;"># Use EOS as padding</span>

<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">tokenize</span>(examples):
    <span style="color:#569cd6;">return</span> tokenizer(
        examples[<span style="color:#ce9178;">"text"</span>],
        truncation=<span style="color:#569cd6;">True</span>,        <span style="color:#6a9955;"># Cut off if too long</span>
        padding=<span style="color:#ce9178;">"max_length"</span>, <span style="color:#6a9955;"># Pad to same length</span>
        max_length=512           <span style="color:#6a9955;"># 512 tokens max</span>
    )

tokenized_train = train_data.map(tokenize, batched=<span style="color:#569cd6;">True</span>)
tokenized_eval = eval_data.map(tokenize, batched=<span style="color:#569cd6;">True</span>)

<span style="color:#6a9955;"># Now each example has: input_ids, attention_mask</span>
print(tokenized_train[0][<span style="color:#ce9178;">"input_ids"</span>][:10])
<span style="color:#6a9955;"># → [1, 464, 8522, 4521, 319, 287, 26012, 438, 1784, 29973]</span></div>

<p><strong>"truncation=True"</strong> cuts chunks longer than 512 tokens. <strong>"padding=max_length"</strong> pads shorter chunks with zeros so all chunks are the same length. This is needed for batch training.</p>
</div></div>`},
{id:'4.5',title:'Set Labels for Self-Supervised Learning',
fact:'For next-token prediction, the labels are just the input shifted by one position. The model tries to predict token N+1 from tokens 1...N. No human labeling needed!',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">4.5</span> Set Labels = input_ids.copy()</h2>
<p>This is self-supervised learning. The model's task: <strong>predict the next token</strong>. The "correct answer" is already in the text — it's just the next word.</p>

<div class="code-box"><span style="color:#6a9955;"># Labels = same as input (the model will auto-shift internally)</span>
<span style="color:#569cd6;">def</span> <span style="color:#c586c0;">add_labels</span>(examples):
    examples[<span style="color:#ce9178;">"labels"</span>] = examples[<span style="color:#ce9178;">"input_ids"</span>].copy()
    <span style="color:#569cd6;">return</span> examples

tokenized_train = tokenized_train.map(add_labels, batched=<span style="color:#569cd6;">True</span>)
tokenized_eval = tokenized_eval.map(add_labels, batched=<span style="color:#569cd6;">True</span>)</div>

<div style="font-size:0.85rem;color:var(--tdim);line-height:1.8;margin-top:0.5rem;">
<strong>How self-supervised learning works:</strong><br>
&nbsp;&nbsp;Input:  "The patient presented with acute"<br>
&nbsp;&nbsp;Label:  "patient presented with acute myocardial"<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;↑ The model must predict this word<br><br>
The loss is computed for EVERY token position. The model learns: "In medical text, 'acute' is often followed by 'myocardial'." No human ever labeled anything. The text IS the label.
</div>
</div></div>`},
{id:'4.6',title:'Load Base Model with Quantization',
fact:'TinyLlama-1.1B in 8-bit takes ~1.1 GB VRAM instead of ~2.2 GB. Small enough to fine-tune on a free Colab T4 (16 GB).',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">4.6</span> Load Base Model with BitsAndBytes 8-bit</h2>
<p>We load the model quantized to 8-bit. This halves the memory while keeping good accuracy for fine-tuning.</p>

<div class="code-box"><span style="color:#569cd6;">from</span> transformers <span style="color:#569cd6;">import</span> AutoModelForCausalLM, BitsAndBytesConfig
<span style="color:#569cd6;">import</span> torch

bnb_config = BitsAndBytesConfig(
    load_in_8bit=<span style="color:#569cd6;">True</span>,           <span style="color:#6a9955;"># 8-bit quantization</span>
)

model = AutoModelForCausalLM.from_pretrained(
    model_name,
    quantization_config=bnb_config,
    device_map=<span style="color:#ce9178;">"auto"</span>,        <span style="color:#6a9955;"># Auto-distribute across GPU/CPU</span>
    torch_dtype=torch.float16
)

<span style="color:#6a9955;"># Disable caching — saves memory during training</span>
model.config.use_cache = <span style="color:#569cd6;">False</span>

print(<span style="color:#ce9178;">f"Model loaded: {sum(p.numel() for p in model.parameters())/1e9:.1f}B params"</span>)
<span style="color:#6a9955;"># → Model loaded: 1.1B params</span></div>

<p><strong>8-bit (not 4-bit) for Phase 4.</strong> QLoRA (4-bit) works too, but 8-bit is simpler for a first hands-on. The model takes ~1.1 GB instead of 2.2 GB.</p>
</div></div>`},
{id:'4.7',title:'Configure LoRA on the Model',
fact:'With LoRA applied, only 0.5% of the 1.1B parameters are trainable. The rest stay frozen in 8-bit.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">4.7</span> Configure LoRA — r=8, alpha=16</h2>
<p>This is where everything from Phase 3 comes together. We apply LoRA to the loaded model.</p>

<div class="code-box"><span style="color:#569cd6;">from</span> peft <span style="color:#569cd6;">import</span> LoraConfig, get_peft_model, prepare_model_for_kbit_training

<span style="color:#6a9955;"># Prep model for quantized training</span>

import fitz

def chunk_text(text, max_chars=2000):
    paragraphs = text.split("\\n\\n")
    chunks, current = [], ""
    for para in paragraphs:
        if len(current) + len(para) < max_chars: current += para + "\n\n"
        else: chunks.append(current.strip()); current = para + "\n\n"
    if current: chunks.append(current.strip())
    return chunks

chunks = chunk_text(full_text)
print(f"Created {len(chunks)} chunks")</div>

<div class="code-box"><span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 4</span> <span style="color:#6a9955;">— Dataset + Tokenize + Labels</span>

from datasets import Dataset
from transformers import AutoTokenizer

model_name = "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
tokenizer = AutoTokenizer.from_pretrained(model_name)
tokenizer.pad_token = tokenizer.eos_token

data = [{"text": c} for c in chunks]
dataset = Dataset.from_list(data).train_test_split(test_size=0.1, seed=42)

def tokenize(ex): return tokenizer(ex["text"], truncation=True, padding="max_length", max_length=512)
tk_train = dataset["train"].map(tokenize, batched=True)
tk_eval  = dataset["test"].map(tokenize, batched=True)

def add_labels(ex): ex["labels"] = ex["input_ids"].copy(); return ex
tk_train = tk_train.map(add_labels, batched=True)
tk_eval  = tk_eval.map(add_labels, batched=True)
print(f"Train: {len(tk_train)}, Eval: {len(tk_eval)}")</div>

model = AutoModelForCausalLM.from_pretrained(model_name, quantization_config=bnb_config, device_map="auto", torch_dtype=torch.float16)
model.config.use_cache = False
print(f"Model loaded: {sum(p.numel() for p in model.parameters())/1e9:.1f}B params")</div>

<div class="code-box"><span style="background:var(--violet);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;">CELL 6</span> <span style="color:#6a9955;">— Apply LoRA</span>

lora_config = LoraConfig(r=8, lora_alpha=16, lora_dropout=0.1, target_modules=["q_proj","v_proj"], bias="none", task_type="CAUSAL_LM")

        'Setup':'🧠 Concepts: Colab basics, GPU setup. Why: Phase 2 taught us quantization needs GPU — T4 is free.',
        '4.1':'🧠 Concepts: PDF = raw domain text. Why: Phase 1.6 — Non-Instructional data type. No labels needed.',
        '4.2':'🧠 Concepts: Context window (Phase 3.1). Why: Models can only process ~512 tokens at once. Chunking = splitting big text into bite-sized pieces.',
        '4.3':'🧠 Concepts: Data format. Why: Phase 1.6 — {"text": "..."} is the non-instructional format for self-supervised learning.',
        '4.4':'🧠 Concepts: Tokenization. Why: Models read integers, not words. Phase 2 quantization later compresses these integers.',
        '4.5':'🧠 Concepts: Self-supervised learning. Why: labels = input_ids. Model predicts next token from previous tokens. No human labels — the text IS the label.',
        '4.6':'🧠 Concepts: Phase 2 Quantization! BitsAndBytes 8-bit = FP16→INT8. Why: Halves memory (2.2GB→1.1GB). Same math as Phase 2.7.',
        '4.7':'🧠 Concepts: Phase 3 LoRA! r=8, alpha=16, target_modules=["q_proj","v_proj"]. Why: 0.38% trainable. Frozen base model + B×A adapters. Phase 3.5 equation in action.',
        '4.8':'🧠 Concepts: Hyperparameters. lr=2e-4 (0.0002) — same idea as lr=0.02 in QAT but realistic for real training. Epochs, batch size, gradient accumulation.',
        '4.9':'🧠 Concepts: Phase 2 STE + Phase 3 LoRA combined! Forward: W₀×x+B×A×x. Backward: STE gradient flows to B,A only. Adam updates B,A. Base model never changes.',
        '4.10':'🧠 Concepts: Domain adaptation complete! Model absorbed domain language. Next: Phase 5 Instruction FT, Phase 6 DPO. Merge adapter before next stage (Phase 3.10!).'
      };
      if(concepts[stepId]){
        const tag=document.createElement('div');
        tag.className='concept-tag';
        tag.style.cssText='margin-top:0.8rem;padding:0.6rem 0.8rem;background:rgba(0,122,153,0.05);border:1px solid rgba(0,122,153,0.2);border-radius:8px;font-size:0.75rem;color:#4a4f5a;line-height:1.6;';
        tag.innerHTML=concepts[stepId];
        card.appendChild(tag);
      }
    });
  },60);

  document.getElementById('slideContainer').scrollIntoView({behavior:'smooth',block:'start'});
}

function goTo(i){if(i<0||i>=slides.length)return;render(i);}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&cur<slides.length-1)goTo(cur+1);
  if(e.key==='ArrowLeft'&&cur>0)goTo(cur-1);
});

render(0);
</script>
</body>
</html>
