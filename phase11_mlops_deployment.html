<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 11: MLOps & Deployment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafbfc;--card:#fff;--raised:#f0f2f5;--border:#dde0e5;--text:#1a1d23;--tdim:#4a4f5a;--tmut:#8b9099;--violet:#5b3aa8;--vbg:#f3effc;--green:#1a6e34;--amber:#b87000;--cyan:#007a99;--magenta:#9e2a6b;--red:#c62828;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;min-height:100vh;}
.app{max-width:1000px;margin:0 auto;padding:1.5rem;}

.header{text-align:center;padding:2rem 0 1rem;}
.header .badge{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:0.7rem;letter-spacing:0.12em;color:var(--cyan);border:1.5px solid rgba(0,122,153,0.3);background:rgba(0,122,153,0.06);border-radius:100px;padding:0.3em 1.2em;margin-bottom:0.75rem;font-weight:600;}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--violet);}
.header p{color:var(--tdim);font-size:0.95rem;}

.topbar{position:sticky;top:0;z-index:100;background:rgba(250,251,252,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0.5rem 1.5rem;display:flex;align-items:center;gap:0.8rem;}
.topbar .logo{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;letter-spacing:0.12em;color:var(--violet);white-space:nowrap;font-weight:600;}
.topbar .dots{display:flex;gap:0.3rem;flex:1;justify-content:center;}
.topbar .dot{width:22px;height:3px;border-radius:2px;background:var(--border);transition:0.3s;cursor:pointer;}
.topbar .dot.done{background:var(--green);}
.topbar .dot.active{background:var(--violet);box-shadow:0 0 6px rgba(91,58,168,0.3);}
.topbar .step-label{font-family:'Space Grotesk',monospace;font-size:0.6rem;color:var(--tmut);}

.chips{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin:1rem 0;}
.chip{font-family:'Space Grotesk',sans-serif;font-size:0.6rem;padding:0.4em 1em;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--tmut);cursor:pointer;transition:0.2s;}
.chip:hover{border-color:var(--tmut);}
.chip.visited{border-color:var(--green);color:var(--green);background:rgba(26,110,52,0.06);}
.chip.current{border-color:var(--violet);color:var(--violet);background:var(--vbg);}

.slide{opacity:0;transform:translateY(20px);animation:fadeIn 0.45s ease forwards;}
@keyframes fadeIn{to{opacity:1;transform:translateY(0);}}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.75rem;margin-bottom:1rem;}
.card h2{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:600;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;}
.card h2 .num{font-size:0.7rem;color:var(--violet);background:var(--vbg);border-radius:6px;padding:0.2em 0.6em;font-weight:700;}
.card p{color:var(--tdim);margin-bottom:0.7rem;font-size:0.95rem;}

.code-box{background:#1e1e1e;border:1px solid #333;border-left:3px solid var(--violet);border-radius:8px;padding:1rem 1.25rem;margin:0.75rem 0;font-family:'Space Grotesk',monospace;font-size:0.85rem;line-height:1.8;white-space:pre-wrap;overflow-x:auto;color:#d4d4d4;}

.compare{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0;}
.cmp-card{background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:1.25rem;}

.flow{display:flex;align-items:center;gap:0.3rem;flex-wrap:wrap;justify-content:center;margin:1rem 0;font-family:'Space Grotesk',sans-serif;font-size:0.62rem;}
.flow-step{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.7rem;text-align:center;}
.flow-arrow{color:var(--violet);font-size:1rem;}

.callout{background:var(--vbg);border:1px solid rgba(91,58,168,0.15);border-radius:10px;padding:0.75rem 1rem;margin:0.75rem 0;font-size:0.88rem;line-height:1.7;}

.fun-fact{background:linear-gradient(135deg,rgba(91,58,168,0.04),rgba(0,122,153,0.04));border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;margin:1rem 0;display:flex;align-items:flex-start;gap:0.7rem;font-size:0.88rem;}

.nav-row{display:flex;justify-content:space-between;margin:1.5rem 0 3rem;}
.nav-btn{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.06em;padding:0.65em 1.6em;border:1.5px solid var(--border);border-radius:100px;background:var(--bg);color:var(--text);cursor:pointer;transition:0.2s;}
.nav-btn:hover{border-color:var(--violet);color:var(--violet);}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
.nav-btn.primary{background:var(--violet);border-color:var(--violet);color:#fff;}

@media(max-width:768px){.app{padding:0.75rem;}.compare{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="app">

<script>
const slides=[
{id:'11.1',title:'MLflow — Track Every Experiment',
fact:'MLflow was created by Databricks in 2018 and is now the de-facto standard for ML experiment tracking. It is used by OpenAI, Microsoft, and thousands of ML teams.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">11.1</span> MLflow — Git for Model Experiments</h2>
<p>Every time you fine-tune, MLflow logs: <strong>what parameters</strong> you used, <strong>what metrics</strong> you got, and <strong>what model</strong> you produced.</p>

<div class="code-box">
<span style="color:#569cd6;">import</span> mlflow

<span style="color:#6a9955;"># Start tracking this fine-tuning run</span>
<span style="color:#569cd6;">with</span> mlflow.start_run(run_name=<span style="color:#ce9178;">"phase5-sft-metformin-r8-lr2e4"</span>):

    <span style="color:#6a9955;"># Log ALL parameters (everything you chose)</span>
    mlflow.log_params({
        <span style="color:#ce9178;">"r"</span>: <span style="color:#ce9178;">8</span>, <span style="color:#ce9178;">"lora_alpha"</span>: <span style="color:#ce9178;">16</span>, <span style="color:#ce9178;">"lr"</span>: <span style="color:#ce9178;">2e-4</span>,
        <span style="color:#ce9178;">"epochs"</span>: <span style="color:#ce9178;">10</span>, <span style="color:#ce9178;">"model"</span>: <span style="color:#ce9178;">"TinyLlama-1.1B"</span>,
        <span style="color:#ce9178;">"dataset"</span>: <span style="color:#ce9178;">"metformin-5-qa"</span>
    })

    <span style="color:#6a9955;"># Train (your existing code)</span>
    trainer.train()

    <span style="color:#6a9955;"># Log metrics (what the training produced)</span>
    mlflow.log_metrics({<span style="color:#ce9178;">"final_loss"</span>: <span style="color:#ce9178;">0.43</span>, <span style="color:#ce9178;">"steps"</span>: <span style="color:#ce9178;">20</span>})

    <span style="color:#6a9955;"># Save the adapter as an artifact</span>
    mlflow.log_artifact(<span style="color:#ce9178;">"./instruction_tuned_adapter"</span>)

<span style="color:#6a9955;"># View all runs: mlflow ui -> localhost:5000</span></div>

<h3 style="font-family:'Space Grotesk',sans-serif;font-size:0.8rem;color:var(--violet);margin:1rem 0 0.5rem;">📁 Data Versioning — What Data Was This Trained On?</h3>
<p style="font-size:0.9rem;color:var(--tdim);">Models are useless without knowing which data version produced them. DVC (Data Version Control) solves this — like Git for datasets.</p>

<div class="code-box">
<span style="color:#6a9955;"># DVC tracks your training data alongside your code</span>
<span style="color:#6a9955;"># Install: pip install dvc</span>

<span style="color:#6a9955;"># Initialize DVC in your project</span>
dvc init

<span style="color:#6a9955;"># Track your dataset (like git add, but for large files)</span>
dvc add data/instruction_data.json
git add data/instruction_data.json.dvc .gitignore
git commit -m <span style="color:#ce9178;">"Add metformin instruction dataset v1"</span>

<span style="color:#6a9955;"># Push data to remote storage (S3, GCS, etc.)</span>
dvc remote add -d storage s3://my-bucket/datasets
dvc push

<span style="color:#6a9955;"># Now in MLflow, log which data version was used:</span>
mlflow.log_param(<span style="color:#ce9178;">"data_version"</span>, <span style="color:#ce9178;">"v1"</span>)
mlflow.log_param(<span style="color:#ce9178;">"data_hash"</span>, <span style="color:#ce9178;">"a1b2c3"</span>)  <span style="color:#6a9955;"># Git commit hash of .dvc file</span></div>

<div class="callout"><strong>🧠 The 3 things that must be versioned together:</strong> Code (Git) + Data (DVC) + Model (MLflow). If you change the data and retrain, you know exactly which data produced which model. Without data versioning, you're guessing.</div>
</div></div>`},
{id:'11.2',title:'Model Registry — Version & Stage',
fact:'The MLflow Model Registry lets you manage model versions like Git branches. Each version has a stage: Staging (testing) -> Production (live) -> Archived (retired).',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">11.2</span> Model Registry — Which Version Is in Production?</h2>
<p>After running 20 experiments, you have 20 adapters. Which one is deployed? Which one is being tested? The registry tracks this.</p>

<div class="code-box">
<span style="color:#6a9955;"># Register the best model</span>
mlflow.register_model(
    <span style="color:#ce9178;">"runs:/abc123/instruction_tuned_adapter"</span>,
    <span style="color:#ce9178;">"metformin-medical-qa"</span>
)

<span style="color:#6a9955;"># Promote through stages</span>
<span style="color:#569cd6;">from</span> mlflow <span style="color:#569cd6;">import</span> MlflowClient
client = MlflowClient()

<span style="color:#6a9955;"># Version 1: testing internally</span>
client.transition_model_version_stage(
    name=<span style="color:#ce9178;">"metformin-medical-qa"</span>, version=<span style="color:#ce9178;">1</span>,
    stage=<span style="color:#ce9178;">"Staging"</span>
)

<span style="color:#6a9955;"># Version 1: passed tests -> production!</span>
client.transition_model_version_stage(
    name=<span style="color:#ce9178;">"metformin-medical-qa"</span>, version=<span style="color:#ce9178;">1</span>,
    stage=<span style="color:#ce9178;">"Production"</span>
)

<span style="color:#6a9955;"># Now your API loads "Production" stage automatically</span>
model = mlflow.pyfunc.load_model(<span style="color:#ce9178;">"models:/metformin-medical-qa/Production"</span>)</div>

<div class="flow" style="margin:1rem 0;">
  <div class="flow-step">Experiment<br>r=8, lr=2e-4</div><span class="flow-arrow">→</span>
  <div class="flow-step">Register<br>Version 1</div><span class="flow-arrow">→</span>
  <div class="flow-step" style="border-color:var(--amber);">Staging<br>(testing)</div><span class="flow-arrow">→</span>
  <div class="flow-step" style="border-color:var(--green);">Production<br>(live!)</div><span class="flow-arrow">→</span>
  <div class="flow-step" style="border-color:var(--tmut);">Archived<br>(retired)</div>
</div>
</div></div>`},
{id:'11.3',title:'Comparing Runs — Find the Best Config',
fact:'MLflow UI shows all your runs in a table. Sort by loss, filter by hyperparams. Found the best config in 10 seconds instead of scrolling through notebooks.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">11.3</span> Compare Runs Side by Side</h2>
<p>You ran 5 experiments with different learning rates. Which was best? MLflow answers instantly.</p>

<table style="width:100%;border-collapse:collapse;font-size:0.82rem;margin:1rem 0;">
<thead><tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.3rem;">Run</th><th style="text-align:left;padding:0.3rem;">lr</th><th style="text-align:left;padding:0.3rem;">epochs</th><th style="text-align:left;padding:0.3rem;">Final Loss</th><th style="text-align:left;padding:0.3rem;">Verdict</th></tr></thead>
<tbody>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.3rem;">run-1</td><td>2e-4</td><td>3</td><td style="color:var(--amber);">0.87</td><td>Underfit</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.3rem;">run-2</td><td>2e-4</td><td>10</td><td style="color:var(--green);">0.43</td><td>Good</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.3rem;">run-3</td><td>5e-5</td><td>10</td><td style="color:var(--green);">0.38</td><td style="font-weight:700;color:var(--violet);">⭐ Best</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.3rem;">run-4</td><td>5e-4</td><td>10</td><td style="color:var(--red);">1.23</td><td>lr too high</td></tr>
<tr><td style="padding:0.3rem;">run-5</td><td>2e-4</td><td>20</td><td style="color:var(--red);">0.15</td><td>Overfit</td></tr>
</tbody>
</table>

<div class="callout">Run <code>mlflow ui</code> in terminal → open localhost:5000 → scatter plot of lr vs loss → click best point → register as Production. Done in 30 seconds.</div>
</div></div>`},
{id:'11.4',title:'CI/CD for Fine-Tuning',
fact:'Netflix retrains 500+ models weekly via automated CI/CD pipelines. New data arrives -> pipeline triggers -> model trained -> evaluated -> if better than current, auto-deployed.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">11.4</span> Automated Retraining Pipelines</h2>
<p>Fine-tuning isn't one-and-done. New data arrives. Model drifts. You need automated retraining.</p>

<div class="flow" style="margin:1rem 0;">
  <div class="flow-step">New PDFs<br>uploaded</div><span class="flow-arrow">→</span>
  <div class="flow-step">GitHub Action<br>triggers</div><span class="flow-arrow">→</span>
  <div class="flow-step">Colab/SageMaker<br>fine-tunes</div><span class="flow-arrow">→</span>
  <div class="flow-step">MLflow<br>evaluates</div><span class="flow-arrow">→</span>
  <div class="flow-step" style="border-color:var(--green);">Better?<br>Auto-deploy!</div>
</div>

<div class="code-box">
<span style="color:#6a9955;"># .github/workflows/retrain.yml</span>
<span style="color:#569cd6;">name</span>: <span style="color:#ce9178;">Retrain on New Data</span>
<span style="color:#569cd6;">on</span>:
  <span style="color:#569cd6;">push</span>:
    <span style="color:#569cd6;">paths</span>: [<span style="color:#ce9178;">"data/new_pdfs/**"</span>]  <span style="color:#6a9955;"># Trigger on new PDFs</span>

<span style="color:#569cd6;">jobs</span>:
  <span style="color:#569cd6;">retrain</span>:
    <span style="color:#569cd6;">runs-on</span>: <span style="color:#ce9178;">ubuntu-latest</span>
    <span style="color:#569cd6;">steps</span>:
      - <span style="color:#569cd6;">run</span>: <span style="color:#ce9178;">pip install transformers peft mlflow</span>
      - <span style="color:#569cd6;">run</span>: <span style="color:#ce9178;">python train.py --data new_pdfs/</span>
      - <span style="color:#569cd6;">run</span>: <span style="color:#ce9178;">python evaluate.py --promote-if-better</span></div>
</div></div>`},
{id:'11.5',title:'Deployment Patterns',
fact:'There are 3 ways to serve an LLM: batch (offline, cheap), real-time API (online, responsive), streaming (token by token). Each has different cost/latency tradeoffs.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">11.5</span> Three Ways to Serve Your Fine-Tuned Model</h2>

<div class="compare">
  <div class="cmp-card">
    <h4 style="font-family:'Space Grotesk',sans-serif;font-size:0.7rem;">📦 Batch Inference</h4>
    <p style="font-size:0.8rem;color:var(--tdim);">Process 10,000 prompts overnight. Cheapest ($0.01/1K tokens). Use: labeling datasets, bulk summarization.</p>
  </div>
  <div class="cmp-card">
    <h4 style="font-family:'Space Grotesk',sans-serif;font-size:0.7rem;">🌐 Real-Time API</h4>
    <p style="font-size:0.8rem;color:var(--tdim);">FastAPI + model. Respond in < 500ms. Use: chatbots, customer support. Cost: GPU must stay ON ($1-3/hr).</p>
  </div>
</div>
<div style="margin-top:0.5rem;display:flex;gap:0.5rem;align-items:center;justify-content:center;font-size:0.7rem;color:var(--tmut);">
  <span>Batch: slow & cheap</span><span style="width:100px;height:4px;background:linear-gradient(90deg,var(--green),var(--red));border-radius:2px;"></span><span>Real-time: fast & expensive</span>
</div>
</div></div>`},
{id:'11.6',title:'vLLM — Production-Grade Serving',
fact:'vLLM serves Llama-7B at 5000 tokens/second on a single A100 — 10× faster than HuggingFace pipeline. Used by LMSYS (Chatbot Arena) to serve 100+ models simultaneously.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">11.6</span> vLLM — 10× Faster Than pipeline()</h2>
<p>The <code>pipeline()</code> we used in Colab is for development. vLLM is for production.</p>

<div class="code-box">
<span style="color:#6a9955;"># vLLM serves your fine-tuned model at production speed</span>
<span style="color:#6a9955;"># Install: pip install vllm</span>

<span style="color:#569cd6;">from</span> vllm <span style="color:#569cd6;">import</span> LLM, SamplingParams

<span style="color:#6a9955;"># Load your merged model</span>
llm = LLM(model=<span style="color:#ce9178;">"./merged_medical_model"</span>)

<span style="color:#6a9955;"># Generate — handles batching, KV-cache, PagedAttention automatically</span>
outputs = llm.generate(
    [<span style="color:#ce9178;">"What is Metformin?"</span>, <span style="color:#ce9178;">"Side effects?"</span>],
    SamplingParams(temperature=<span style="color:#ce9178;">0.7</span>, max_tokens=<span style="color:#ce9178;">100</span>)
)

<span style="color:#6a9955;"># vLLM also has an OpenAI-compatible API server:</span>
<span style="color:#6a9955;"># python -m vllm.entrypoints.openai.api_server --model ./merged_medical_model</span>
<span style="color:#6a9955;"># Now any OpenAI client can call your model!</span></div>

<table style="width:100%;border-collapse:collapse;font-size:0.8rem;margin:0.5rem 0;">
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.3rem;">pipeline()</td><td style="padding:0.3rem;">~50 tokens/sec</td><td style="color:var(--red);">Dev only</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.3rem;">vLLM</td><td style="padding:0.3rem;">~5000 tokens/sec</td><td style="color:var(--green);">Production</td></tr>
<tr><td style="padding:0.3rem;">TGI (Text Gen Inference)</td><td style="padding:0.3rem;">~4000 tokens/sec</td><td style="color:var(--green);">Alternative to vLLM</td></tr>
</table>
</div></div>`},
{id:'11.7',title:'Monitoring — When to Retrain',
fact:'Model drift detection: if your model\'s accuracy drops 5% below baseline, trigger automatic retraining. Standard practice at Uber, Netflix, and Stripe.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">11.7</span> Monitoring — Is Your Model Still Good?</h2>
<p>Models degrade over time. New medical terms appear. Writing styles change. You need to know WHEN to retrain.</p>

<div class="compare">
  <div class="cmp-card"><h4 style="font-family:'Space Grotesk',sans-serif;font-size:0.7rem;">📊 Data Drift</h4><p style="font-size:0.8rem;color:var(--tdim);">Input distribution changed. "Are users asking about new topics?" Monitor: KL divergence between train and live data.</p></div>
  <div class="cmp-card"><h4 style="font-family:'Space Grotesk',sans-serif;font-size:0.7rem;">📉 Performance Drift</h4><p style="font-size:0.8rem;color:var(--tdim);">Model accuracy dropping. "Are users saying the answers are worse?" Monitor: thumbs up/down ratio, response length.</p></div>
</div>

<div class="code-box">
<span style="color:#6a9955;"># Simple drift check — run weekly</span>
<span style="color:#569cd6;">import</span> mlflow

current_loss = evaluate(model, live_data)
baseline_loss = mlflow.get_run(<span style="color:#ce9178;">"production-run-id"</span>).data.metrics[<span style="color:#ce9178;">"final_loss"</span>]

<span style="color:#569cd6;">if</span> current_loss > baseline_loss * <span style="color:#ce9178;">1.05</span>:  <span style="color:#6a9955;"># 5% worse than baseline</span>
    trigger_retraining()  <span style="color:#6a9955;"># Automatically retrain on latest data</span></div>
</div></div>`},
{id:'11.8',title:'Cost Optimization',
fact:'Serving a fine-tuned Llama-7B on a dedicated GPU costs ~$730/month. With quantization + spot instances + caching, you can get it under $100/month.',
render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">11.8</span> Cost Optimization — Serve for Less</h2>

<table style="width:100%;border-collapse:collapse;font-size:0.85rem;margin:1rem 0;">
<thead><tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.3rem;">Technique</th><th style="text-align:left;padding:0.3rem;">Saves</th><th style="text-align:left;padding:0.3rem;">Tradeoff</th></tr></thead>
<tbody>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.3rem;">INT4 Quantization</td><td style="padding:0.3rem;color:var(--green);">75% memory</td><td style="padding:0.3rem;">~1% accuracy loss</td></tr>
<tr style="border-bottom:1px solid var(--border);"><td style="padding:0.3rem;">Spot Instances</td><td style="padding:0.3rem;color:var(--green);">60-90% cost</td><td style="padding:0.3rem;">Can be interrupted</td></tr>

let cur=0; const visited=new Set([0]);

function render(i){
  cur=i;visited.add(i);
  document.getElementById('slideContainer').innerHTML=slides[i].render();
  document.getElementById('stepLabel').textContent=`${i+1}/${slides.length}`;
  document.getElementById('funFactText').innerHTML=`<strong>${slides[i].id}:</strong> ${slides[i].fact}`;
  document.getElementById('dots').innerHTML=slides.map((_,j)=>`<div class="dot ${j===cur?'active':visited.has(j)?'done':''}" onclick="goTo(${j})"></div>`).join('');
  document.getElementById('chips').innerHTML=slides.map((s,j)=>`<span class="chip ${j===cur?'current':visited.has(j)?'visited':''}" onclick="goTo(${j})">${s.id}</span>`).join('');
  document.getElementById('prevBtn').disabled=i===0;
  const nb=document.getElementById('nextBtn');
  if(i===slides.length-1){nb.textContent='✓ Complete';nb.style.background='var(--green)';}
  else{nb.textContent='Next →';nb.style.background='var(--violet)';nb.style.color='#fff';}
  document.getElementById('slideContainer').scrollIntoView({behavior:'smooth',block:'start'});
}

function goTo(i){if(i<0||i>=slides.length)return;render(i);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'&&cur<slides.length-1)goTo(cur+1);if(e.key==='ArrowLeft'&&cur>0)goTo(cur-1);});
render(0);
</script>
